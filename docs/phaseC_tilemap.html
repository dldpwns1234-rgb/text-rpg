<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>판타지 미니 4X — Phase B 조각②: 채집 + 성 내정</title>
<style>
  :root{--bg:#0f172a;--card:#1e293b;--card2:#273449;--line:#334155;--txt:#e2e8f0;--dim:#94a3b8;
    --blue:#3b82f6;--red:#ef4444;--gold:#f59e0b;--green:#22c55e;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,"Malgun Gothic",system-ui,sans-serif;padding:12px;line-height:1.4;font-size:14px;}
  h1{font-size:18px;margin:0 0 8px;}
  .top{position:relative;display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:var(--card);
    border:1px solid var(--line);border-radius:10px;padding:8px 12px;margin-bottom:10px;}
  .resbar{display:flex;gap:6px;flex-wrap:wrap;}
  .res{display:flex;gap:6px;align-items:center;background:var(--bg);border:1px solid var(--line);
    border-radius:8px;padding:4px 9px;font-variant-numeric:tabular-nums;flex-shrink:0;}
  .res .inc{color:var(--green);font-size:12px;}
  button{background:var(--card2);color:var(--txt);border:1px solid var(--line);border-radius:8px;
    padding:6px 12px;font-size:13px;cursor:pointer;font-weight:600;}
  button:hover:not(:disabled){background:var(--line);}
  button:disabled{opacity:.4;cursor:default;}
  #endturn{background:var(--green);color:#04240f;border:none;}
  #menuBtn{display:none;}                    /* 데스크톱: ☰ 안 씀, 아래 5버튼 항상 인라인 */
  .menu-drop{display:flex;gap:8px;}
  .wrap{display:grid;grid-template-columns:1fr 300px;gap:10px;}
  .mapbox{background:#0b1220;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  svg{display:block;width:100%;height:auto;}
  button,.minibtn{touch-action:manipulation;-webkit-tap-highlight-color:rgba(245,158,11,.25);}  /* 탭 300ms 지연 제거 */
  .sheet-handle{display:none;}                /* 데스크톱: 바텀시트 손잡이 숨김(패널이 항상 옆에 펼쳐져 있음) */
  @media(max-width:820px){          /* 모바일: 지도는 드래그 팬 + 고정 높이, 패널은 바텀시트 */
    .wrap{grid-template-columns:1fr;}
    .mapbox{height:52vh;overflow:hidden;touch-action:none;}   /* 네이티브 스크롤 대신 JS 드래그 팬 */
    svg{width:672px;max-width:none;transform-origin:0 0;}     /* 타일 ~47px, 팬으로 좌우 이동 */
    .minibtn{font-size:13px;padding:8px 11px;}
    button{min-height:42px;}
    .prodrow{padding:7px 0;}
    select,input[type=number]{min-height:38px;font-size:14px;padding:5px;}
    .top{padding:6px 8px;gap:5px 6px;}
    .resbar{flex:1 1 100%;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;
      scrollbar-width:none;-ms-overflow-style:none;padding-bottom:2px;}   /* 자원칸 한 줄 가로 스크롤(3줄→1줄, 유저 피드백: 상단이 자리를 너무 차지) */
    .resbar::-webkit-scrollbar{display:none;}
    .res{padding:4px 7px;font-size:12px;}
    #menuBtn{display:inline-block;}
    .menu-drop{position:absolute;top:100%;right:12px;margin-top:4px;background:var(--card);
      border:1px solid var(--line);border-radius:10px;padding:8px;flex-direction:column;z-index:16;
      box-shadow:0 6px 16px rgba(0,0,0,.4);}
    .menu-drop.hidden{display:none;}
    .sheet-handle{display:flex;margin:-12px -12px 8px;border-bottom:1px solid var(--line);
      position:sticky;top:0;background:var(--card);z-index:2;}   /* 유저 피드백: 내정 내용 스크롤 시 손잡이가 같이 밀려 올라가 빠져나갈 방법이 사라짐 → 상단 고정 */
    .qc{flex:1;min-width:0;text-align:center;font-size:11px;color:var(--dim);padding:9px 4px;
      cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-right:1px solid var(--line);}
    .qc:last-child{border-right:none;}
    .qc:active{background:var(--card2);}   /* 유저 피드백: 손잡이 대신 목표·내정·선택 3칸 퀵바 — 탭하면 바로 그 화면으로 */
    .panel{position:fixed;left:0;right:0;bottom:0;max-height:18vh;overflow-y:auto;
      border-radius:14px 14px 0 0;box-shadow:0 -8px 24px rgba(0,0,0,.45);z-index:15;
      transition:max-height .25s ease;}
    .panel.sheetOpen{max-height:78vh;}
  }
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;font-size:13px;}
  .panel h3{margin:0 0 8px;font-size:14px;display:flex;justify-content:space-between;}
  .k{color:var(--dim);}
  .edge{stroke:#334155;stroke-width:3;}
  .reach{stroke:var(--green);stroke-width:3;stroke-dasharray:5 4;fill:none;opacity:.9;}
  .nlabel{fill:var(--dim);font-size:11px;text-anchor:middle;pointer-events:none;}
  .gath{fill:var(--green);font-size:11px;text-anchor:middle;font-weight:700;pointer-events:none;}
  .army{cursor:pointer;} .node-hit{cursor:pointer;}
  .sel-ring{fill:none;stroke:var(--gold);stroke-width:3;stroke-dasharray:4 3;}
  .prodrow{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--card2);}
  .prodrow .nm{flex:1;} .prodrow .cost{font-size:11px;color:var(--dim);}
  .compgrid{display:grid;gap:2px;margin:4px 0;align-items:stretch;}   /* 출전 편성 그리드(열=병종,행=티어) — 유저 피드백: 세로 리스트가 너무 길다 */
  .compgrid .gh{font-size:9px;color:var(--dim);text-align:center;padding:2px 0;white-space:nowrap;overflow:hidden;}
  .compgrid .gcell{display:flex;flex-direction:column;align-items:stretch;background:var(--bg);border-radius:4px;overflow:hidden;}
  .compgrid .gcell.empty{align-items:center;justify-content:center;color:var(--dim);font-size:10px;background:none;}
  .compgrid .gbtn{font-size:10px;padding:2px 0;line-height:1.4;border-radius:0;min-height:0;}
  .compgrid .gn{text-align:center;font-size:10px;padding:1px 0;background:var(--card2);}
  .hero{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:7px;margin:6px 0;}
  .hero .loc{font-size:11px;color:var(--gold);}
  .minibtn{font-size:11px;padding:3px 7px;}
  .toast{position:fixed;left:50%;top:14px;transform:translateX(-50%);background:#111827;
    border:1px solid var(--line);padding:8px 15px;border-radius:8px;font-size:13px;opacity:0;
    transition:opacity .25s;pointer-events:none;z-index:9;}
  .toast.show{opacity:1;}
  .queue{font-size:12px;color:var(--dim);margin-top:4px;}
  hr{border:none;border-top:1px solid var(--line);margin:10px 0;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:20;}
  .modal-overlay.hidden{display:none;}
  .modal{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 24px;max-width:340px;text-align:center;}
  .modal h2{margin:0 0 10px;font-size:20px;}
  .modal .res-line{margin:7px 0;font-size:14px;}
  .modal button{margin-top:14px;padding:6px 18px;}
</style>
</head>
<body>
<h1>🏰 Phase C — 타일 그리드 (14×9, game.js 재사용)</h1>
<div class="top">
  <span class="k">턴 <b id="turn" style="color:var(--gold)">1</b></span>
  <span id="resbar" class="resbar"></span>
  <span id="moveConfirm"></span>
  <span style="flex:1"></span>
  <div id="menuDrop" class="menu-drop hidden">
    <button id="saveBtn" title="현재 판 저장(브라우저)">💾</button>
    <button id="loadBtn" title="저장된 판 불러오기">📂</button>
    <button id="exportBtn" title="세이브 파일로 내보내기">⬇</button>
    <button id="importBtn" title="세이브 파일 가져오기">⬆</button>
    <input type="file" id="importFile" accept=".json,application/json" style="display:none">
    <button id="newBtn" title="새 게임">🆕</button>
  </div>
  <button id="menuBtn" title="메뉴(저장·불러오기 등)">☰</button>
  <button id="castleBtn">🏰 성 내정</button>
  <button id="endturn">⏭ 턴 종료</button>
</div>
<div class="wrap">
  <div class="mapbox"><svg id="map" viewBox="0 0 776 506" preserveAspectRatio="xMidYMid meet"></svg></div>
  <div id="panel" class="panel">
    <div class="sheet-handle" id="sheetHandle">
      <div class="qc" id="qcQuest"></div>
      <div class="qc" id="qcCastle"></div>
      <div class="qc" id="qcDeploy"></div>
      <div class="qc" id="qcSel"></div>
    </div>
    <div id="panelBody"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div id="modal" class="modal-overlay hidden"><div class="modal" id="modalBody"></div></div>

<script>
/* ==== engine.js 인라인 (build.js 생성, 직접 수정 금지) ==== */
/* =====================================================================
   mini4x 전투 엔진 — 단일 캔노니컬 소스 (node + 브라우저 공용)
   - 규칙: 기획서 §7 (3병과×2클래스, 3열, 특수 확률, 특화 ×1.4,
           전열 피해 분산 ②, 창병 요격, 티어 배율)
   - node:    const E = require('./engine.js');  E.simulate(...)
   - 브라우저: <script>로 인라인되면 UNITS/simulate 등이 그대로 전역
   - 수치는 여기서만 고친다 → verify.js / 프로토타입이 함께 따라옴
   ===================================================================== */
'use strict';

const CONST = { FLOOR:0.15, FALLBACK:0.85, SPEC_MULT:1.4, SPLIT:0.6, COUNTER_MULT:2.0, HERO_BUFF:0.20,
  BATTLE_ROUNDS:40 };  // 게임·검증 공용 전투 라운드 캡. HP×1.0에서 전투는 ~30R에 결착 → 40R이면 무승부 소멸. game.js/verify.js가 이 값을 참조(드리프트 방지).

const UNITS = {
  "중갑보병":{hp:120,atk:8, df:12,proc:0.0, row:"front",kind:"tank",  desc:"방어 탱커"},
  "창병":   {hp:100,atk:12,df:6, proc:0.55,row:"front",kind:"spear", desc:"대기병 요격"},
  "장궁병": {hp:65, atk:16,df:3, proc:0.35,row:"back", kind:"gen_am",desc:"범용(앞+중)"},
  "석궁병": {hp:60, atk:16,df:3, proc:0.0, row:"back", kind:"spec",  desc:"대보병 특화"},
  "경기병": {hp:95, atk:17,df:5, proc:0.45,row:"mid",  kind:"gen_ab",desc:"범용(앞+뒤)"},
  "중기병": {hp:105,atk:12,df:8, proc:0.0, row:"mid",  kind:"spec",  desc:"대보병 돌격"},
  // ===== 몬스터 (PvE 전용, 밸런스 검증 대상 아님 — verify.js가 NAMES에서 monster:true를 걸러냄) =====
  // E2(개성 부여): 전부 kind:"tank"(맹목적 전열 공격)였던 걸 하피·오우거만 기존 kind 체계(범용/특화)로 갈라
  // "숫자만 큰 늑대" 느낌을 깨뜨림 — 새 메커니즘 추가가 아니라 플레이어 유닛에도 쓰는 기존 kind를 재사용(리스크 최소).
  "늑대":  {hp:70, atk:14,df:3, proc:0.0, row:"front",kind:"tank", desc:"기동형 야수", monster:true},
  "고블린":{hp:60, atk:10,df:4, proc:0.0, row:"front",kind:"tank", desc:"약한 몬스터", monster:true},
  "오크":  {hp:150,atk:16,df:10,proc:0.0, row:"front",kind:"tank", desc:"강력한 전위", monster:true},
  "하피":  {hp:70, atk:17,df:3, proc:0.4, row:"back", kind:"gen_ab",desc:"공중 기습 — 확률로 전열+후열 동시 타격", monster:true},
  "오우거":{hp:280,atk:26,df:12,proc:0.0, row:"front",kind:"spec", desc:"거대한 돌격 — 전열에 특화 강타(×1.4)", monster:true},
};
const NAMES = Object.keys(UNITS);
const ROWS  = ["front","mid","back"];
const ROWKO = {front:"앞 · 보병", mid:"중 · 기병", back:"뒤 · 궁병"};

const tierMult = t => 1 + (t-1)*0.15;
const dmg = (a,d) => Math.max(a*CONST.FLOOR, a-d);

function makeArmy(comp, hero, mods){    // mods: {유닛명:{atk,df,hp}} 병종별 스탯 배율(연구)
  const rows = {front:[], mid:[], back:[]};
  // hero: true → +HERO_BUFF, 숫자 → 그 비율만큼 버프(연구·성벽 등 합산용), false/0 → 없음
  const buff = hero===true ? CONST.HERO_BUFF : (typeof hero==="number" ? hero : 0);
  for(const c of comp){
    if(!c || c.count<=0) continue;
    const u=UNITS[c.name], tm=tierMult(c.tier||1), hb=1+buff;
    const m = mods && mods[c.name] ? mods[c.name] : null;
    const st={name:c.name,row:u.row,kind:u.kind,proc:u.proc,tier:c.tier||1,
      atk:u.atk*tm*hb*((m&&m.atk)||1), df:u.df*tm*hb*((m&&m.df)||1), maxhp:u.hp*tm*hb*((m&&m.hp)||1), init:c.count};
    st.pool=st.maxhp*c.count;
    rows[u.row].push(st);
  }
  return rows;
}
const aliveCount = s => s.pool>0 ? Math.ceil(s.pool/s.maxhp) : 0;
const dead = s => s.pool<=0;
function frontmost(r){ for(const x of ROWS){ const L=r[x].filter(s=>!dead(s)); if(L.length) return L[0]; } return null; }
function rowTarget(r,x){ const L=r[x].filter(s=>!dead(s)); return L.length?L[0]:null; }
function spearsFront(r){ return r.front.filter(s=>!dead(s)&&s.kind==="spear"); }
function allStacks(r){ return [...r.front,...r.mid,...r.back].filter(s=>!dead(s)); }
function wiped(r){ return frontmost(r)===null; }

function planAttacks(att, enemy, ev){
  const A=[];
  for(const s of allStacks(att)){
    const a=aliveCount(s), base=s.atk, k=s.kind;
    if(a<=0) continue;
    if(k==="tank"||k==="spear"){ const t=frontmost(enemy); if(t) A.push([t,base,a,s]); }
    else if(k==="spec"){ let t=rowTarget(enemy,"front");
      if(t) A.push([t,base*CONST.SPEC_MULT,a,s]);
      else { t=frontmost(enemy); if(t) A.push([t,base*CONST.FALLBACK,a,s]); } }
    else { const deep = k==="gen_am"?"mid":"back";
      if(Math.random()<s.proc){ const d=rowTarget(enemy,deep);
        if(d){ const ft=frontmost(enemy); A.push([ft,base*CONST.SPLIT,a,s]); A.push([d,base*CONST.SPLIT,a,s]); if(ev) ev.proc++; }
        else { const t=frontmost(enemy); if(t) A.push([t,base*CONST.FALLBACK,a,s]); } }
      else { const t=frontmost(enemy); if(t) A.push([t,base,a,s]); } }
  }
  return A;
}
function resolveRound(A,B,ev){
  const pa=planAttacks(A,B,ev), pb=planAttacks(B,A,ev);
  const dm=new Map(), add=(s,v)=>dm.set(s,(dm.get(s)||0)+v);
  function tally(plan, def){
    for(const [t,ap,cnt,src] of plan){
      if(!t||dead(t)) continue;
      const amount = cnt*dmg(ap,t.df);
      if(t.row==="front"){                       // ② 전열 피해 분산
        const fs=def.front.filter(s=>!dead(s));
        let tot=fs.reduce((x,s)=>x+aliveCount(s),0);
        if(tot<=0) add(t,amount); else for(const s of fs) add(s, amount*aliveCount(s)/tot);
      } else add(t, amount);
      if(src.row==="mid" && t.row==="front"){     // 창병 요격
        for(const sp of spearsFront(def)){
          let nc=0, eng=aliveCount(sp);
          for(let i=0;i<eng;i++) if(Math.random()<sp.proc) nc++;
          if(nc>0){ add(src, nc*dmg(sp.atk*CONST.COUNTER_MULT, src.df)); if(ev) ev.counter+=nc; }
        }
      }
    }
  }
  tally(pa,B); tally(pb,A);
  for(const [s,v] of dm) s.pool-=v;
}
function snapshot(r){
  const live=allStacks(r).map(s=>({name:s.name,row:s.row,tier:s.tier,alive:aliveCount(s),init:s.init}));
  const gone=[...r.front,...r.mid,...r.back].filter(s=>dead(s)).map(s=>({name:s.name,row:s.row,tier:s.tier,alive:0,init:s.init}));
  return live.concat(gone);
}

/* 관전용: 타임라인 프레임 포함 */
function simulate(compA,heroA,compB,heroB,maxRounds,modsA,modsB){
  const A=makeArmy(compA,heroA,modsA), B=makeArmy(compB,heroB,modsB);
  const hp=r=>allStacks(r).reduce((x,s)=>x+s.pool,0);
  const h0A=hp(A), h0B=hp(B);
  const frames=[{round:0,A:snapshot(A),B:snapshot(B),log:"전투 개시!"}];
  let r=0, totalProc=0, totalCounter=0;
  for(let i=0;i<maxRounds;i++){
    if(wiped(A)||wiped(B)) break;
    const ev={proc:0,counter:0};
    const preA=allStacks(A).reduce((x,s)=>x+aliveCount(s),0), preB=allStacks(B).reduce((x,s)=>x+aliveCount(s),0);
    resolveRound(A,B,ev); r++;
    totalProc+=ev.proc; totalCounter+=ev.counter;
    const postA=allStacks(A).reduce((x,s)=>x+aliveCount(s),0), postB=allStacks(B).reduce((x,s)=>x+aliveCount(s),0);
    let log=`R${r}: 아군 -${preA-postA}, 적 -${preB-postB}`;
    if(ev.proc) log+=` · 특수 ${ev.proc}회`;
    if(ev.counter) log+=` · 창병 요격 ${ev.counter}`;
    frames.push({round:r,A:snapshot(A),B:snapshot(B),log});
  }
  let w;
  if(wiped(A)&&!wiped(B)) w="B";
  else if(wiped(B)&&!wiped(A)) w="A";
  else if(wiped(A)&&wiped(B)) w="draw";
  else { const fa=h0A?hp(A)/h0A:0, fb=h0B?hp(B)/h0B:0; w=Math.abs(fa-fb)<0.05?"draw":(fa>fb?"A":"B"); }
  return {frames, w, rounds:r, totalProc, totalCounter,
    survA:allStacks(A).reduce((x,s)=>x+aliveCount(s),0),
    survB:allStacks(B).reduce((x,s)=>x+aliveCount(s),0)};
}
/* 검증용: 가벼운 승패 + 승률 */
function battle(compA,heroA,compB,heroB,maxRounds){ return simulate(compA,heroA,compB,heroB,maxRounds).w; }
function winrate(compA,compB,opts){
  opts=opts||{}; const t=opts.trials||500, mr=opts.maxRounds||CONST.BATTLE_ROUNDS, hA=!!opts.heroA, hB=!!opts.heroB;
  let w=0; for(let i=0;i<t;i++) if(battle(compA,hA,compB,hB,mr)==="A") w++; return w/t;
}

const API = { CONST, UNITS, NAMES, ROWS, ROWKO, tierMult, dmg, makeArmy, simulate, battle, winrate };
if (typeof self !== "undefined") { self.UNITS = UNITS; self.simulate = simulate; self.Engine = API; }

/* ==== game.js 인라인 (build.js 생성, 직접 수정 금지) ==== */
/* =====================================================================

  // ---- 연구 버프 → 전투 mods ----

  function defendCastle(g,attacker){

  const UNIT_TM=t=>1+((t||1)-1)*0.15;   // engine.tierMult 동일(엔진 미노출 대비 로컬)

  // ---- H1(방치형): 자동 채집 — a.gather 켠 부대가 유휴가 되면 가장 부족한 자원의 미점유 자원지로 스스로 진군. 도착하면 기존 주둔 채집(gatherOf)이 수입 발생. ----

  // G-C: 자동 생산 — 반복생산 건물의 큐를 얕게(≤2) 유지(자원이 되는 한). 생산시간 도입으로 큐가 천천히 소모되므로 선불 백로그를 얕게 둠.

  // ---- 시간 소요 건설(건설잡 1개 동시). 완료 시 효과 적용. 저장 호환(순수 데이터) ----
  const ECON_MAX=6;

  // 파성추(C3): 건설 큐를 안 쓰는 즉시 제작 소모품 — 성/경제 업그레이드와 슬롯을 다투지 않음.

  // 승급(C2): 즉시 등급만 올리던 무결정을 "특성 2択" 결정으로 바꿈. promoteHero는 자원 확인 후 후보만 뽑고,

  function draftAdjust(g,u,d){const gar=g.castle.garrison,draft=g.castle.draft;const avail=gar[u]||0,cur=draft[u]||0,tot=Object.values(draft).reduce((x,y)=>x+y,0);

  function makeArmyFromDraft(g){const draft=g.castle.draft,comp={};
    for(const u in draft){comp[u]=draft[u];g.castle.garrison[u]-=draft[u];if(g.castle.garrison[u]<=0)delete g.castle.garrison[u];}
    const army={id:newId(g,"P"),side:"P",node:"P",mp:pBaseMp(g),maxMp:pBaseMp(g),name:(g.armies.filter(a=>a.side==="P").length+1)+"군",comp,hero:null,dest:null,moveProg:0};
    g.armies.push(army); g.castle.draft={}; return army;}
  function deploy(g){if(Object.values(g.castle.draft).reduce((x,y)=>x+y,0)<=0)return null; if(!canAddArmy(g))return null; return makeArmyFromDraft(g);}
  // deployTo: 성에서 출전 후 target 방면으로 목적지 지정(부대가 여러 틱에 걸쳐 이동). {army, target} 반환.
  function deployTo(g,target){if(Object.values(g.castle.draft).reduce((x,y)=>x+y,0)<=0||!canAddArmy(g))return{army:null,target:null};
    const army=makeArmyFromDraft(g);
    if(target!=="P") orderMove(g,army.id,target);
    return {army, target:(target!=="P"&&army.dest)?target:null};}
  // H-온라인 자동화: 자동 출전 — 저장된 편성 즐겨찾기(presets) 중 지금 갖춘 병력으로 채울 수 있는 걸 골라 매턴 최대 1개씩 자동 출전.
  // 사냥/채집을 번갈아 배정(다음 배정 종류는 g.castle.autoDeployNext에 기록) — 유저 요청: "몬스터 자동은 있는데 출전까지도 알아서".
  function setAutoDeploy(g,on){ g.castle.autoDeploy=!!on; return null; }
  function autoDeployTick(g){
    if(!g.castle.autoDeploy || !canAddArmy(g)) return null;
    const presets=g.castle.presets||[];
    for(const p of presets){ if(!p) continue;
      const ok=Object.entries(p).every(([u,c])=>(g.castle.garrison[u]||0)>=c);
      if(!ok) continue;
      const savedDraft=g.castle.draft;   // 플레이어가 수동으로 편성 중이던 draft를 조용히 지우지 않게 보존
      g.castle.draft={...p};
      const army=makeArmyFromDraft(g);
      g.castle.draft=savedDraft;
      const mode=g.castle.autoDeployNext==="gather"?"gather":"hunt";
      army[mode]=true;
      g.castle.autoDeployNext=mode==="hunt"?"gather":"hunt";
      return army; }
    return null; }
  function disband(g,id){const a=findArmy(g,id);if(!a||a.node!=="P")return"성에서만 귀환 가능";
    for(const u in a.comp)g.castle.garrison[u]=(g.castle.garrison[u]||0)+a.comp[u]; if(a.hero)heroById(g,a.hero).loc="idle"; removeArmy(g,a); return null;}

  // ---- 적 AI ----
  function playerCounterUnit(g){const t={front:0,mid:0,back:0};for(const a of g.armies){if(a.side!=="P")continue;for(const u in a.comp){const bu=baseOf(u);if(UNITS[bu].monster)continue;t[UNITS[bu].row]+=a.comp[u];}}
    if(t.front+t.mid+t.back===0)return null;const mx=["front","mid","back"].reduce((a,b)=>t[a]>=t[b]?a:b);
    return mx==="mid"?"창병":mx==="back"?"경기병":"석궁병";}
  function pickAIUnit(counter){if(counter&&Math.random()<0.65)return counter;const pool=["중갑보병","창병","장궁병","경기병"];return pool[Math.floor(Math.random()*pool.length)];}
  // AI 원정대 목적지: 레이드 처치됐고 E가 점거 못했으면 고대성도 노림(기획: AI도 레이드 도전)
  function pickAITarget(g){const R=g.raid;
    if(R&&R.cleared&&R.holder!=="E"&&Math.random()<0.55)return "ANCIENT"; return "P";}
  // 본대에서 tgt명 뽑아 새 원정대 편성(상성·티어 유지)
  function detach(g,home,tgt,name,role,target){const atk={},keys=Object.keys(home.comp);let moved=0;
    for(const u of keys){if(moved>=tgt)break;const take=Math.min(home.comp[u],tgt-moved);atk[u]=take;home.comp[u]-=take;if(home.comp[u]<=0)delete home.comp[u];moved+=take;}
    const e={id:newId(g,role==="attack"&&target==="ANCIENT"?"ER":"EA"),side:"E",node:"E",mp:4,maxMp:4,name,comp:atk,hero:null,role,target};
    g.armies.push(e); return e;}
  function aiTurn(g){
    const grace=g.turn<(AI.graceTurns||0);   // 초반 유예: 예산 낮추고 비축 제한(첫 웨이브 지연·과대화 방지)
    g.ai.budget+=(grace?AI.graceBudget:AI.budgetPerTurn)+Math.min(3,Math.floor(g.turn/14));   // 후반 눈덩이 완화(긴 판 대응)
    let home=g.armies.find(a=>a.side==="E"&&a.node==="E"&&a.role!=="attack");
    if(!home){home={id:newId(g,"EH"),side:"E",node:"E",mp:0,maxMp:0,name:"적 본대",comp:{},hero:null,role:"home"};g.armies.push(home);}
    const cu=playerCounterUnit(g), t=aiTierOf(g); let guard=0;
    const buildCap=grace?Math.min(AI.homeCap,AI.waveSize):AI.homeCap;   // 유예 중엔 waveSize까지만 비축 → 유예 해제 직후 거대 웨이브 방지
    while(guard++<60&&troops(home)<buildCap){const u=pickAIUnit(cu),c=AI_UNIT_COST[u]*t;if(g.ai.budget<c)break;g.ai.budget-=c;const key=uk(u,t);home.comp[key]=(home.comp[key]||0)+1;}
    // 동시 원정대 수 제한(§9 부대 수 상한 대칭) — 무한 웨이브 방지 + waveGap으로 웨이브 간 최소 간격
    const waves=g.armies.filter(a=>a.side==="E"&&a.role==="attack").length;
    const bossAlive=armiesAt(g,"ANCIENT").some(a=>a.side==="M");
    const raiding=g.armies.some(a=>a.side==="E"&&a.target==="ANCIENT");
    const gapOk=(g.turn-(g.ai.lastWave??-99))>=(AI.waveGap||0);
    if(waves<(AI.waveCap||2)&&!grace&&gapOk){
      if(bossAlive&&!raiding&&troops(home)>=40){ detach(g,home,Math.floor(troops(home)*0.7),"적 레이드대","attack","ANCIENT"); g.ai.lastWave=g.turn; }
      else if(troops(home)>=AI.waveSize){ const rid=pickAggressorRival(g), nm=rivalName(rid); const e=detach(g,home,Math.floor(troops(home)*(AI.waveFrac||0.7)),nm?`${nm}의 원정대`:"적 원정대","attack",pickAITarget(g)); if(e)e.rival=rid; g.ai.lastWave=g.turn; }   // I2: 라이벌 스폰서
    }
    for(const e of g.armies.filter(a=>a.side==="E"&&a.role==="attack")){ orderMove(g,e.id,e.target||"P"); }   // 목적지만 지정, 이동은 moveTick
    return null;
  }

  // ---- 시즌형 침공(B2): 예고 → 도래. 기존 웨이브 예산 로직과 별개인 스크립트 이벤트 — 회귀 위험 최소화. ----
  function seasonTick(g){
    if(!g.season) g.season={count:1,next:SEASON_INTERVAL,warnAt:SEASON_INTERVAL-SEASON_WARN_LEAD,warned:false};
    const s=g.season;
    // 예고 시점에 예상 주력 병종을 미리 뽑아 저장 → 도래 때도 같은 값을 써서 예고와 실제가 일치하게(§6 핵심가설: 상성 맞춰 대비).
    if(!s.warned && g.turn>=s.warnAt){ s.warned=true; s.previewUnit=playerCounterUnit(g); return {type:"warning",count:s.count,arriveIn:s.next-g.turn,previewUnit:s.previewUnit}; }
    if(g.turn>=s.next){
      const need=Math.round(Math.max(SEASON_BASE*(1+SEASON_GROWTH*(s.count-1)), computeMight(g)*0.22)*threatMul(g));   // I4: 위협 등반
      const cu=s.previewUnit||playerCounterUnit(g), t=aiTierOf(g), comp={};
      for(let i=0;i<need;i++){ const u=pickAIUnit(cu), key=uk(u,t); comp[key]=(comp[key]||0)+1; }
      const target=pickAITarget(g);
      const rid=pickAggressorRival(g), nm=rivalName(rid);   // I2: 시즌 대침공도 라이벌이 주도
      const e={id:newId(g,"ES"),side:"E",node:"E",mp:0,maxMp:0,name:`${nm?nm+"의 ":""}시즌 대침공 ${s.count}차`,comp,hero:null,role:"attack",target,rival:rid};
      g.armies.push(e); orderMove(g,e.id,target);
      const done=s.count; s.count++;
      const interval=Math.max(SEASON_MIN_INTERVAL, SEASON_INTERVAL-3*(s.count-1));
      s.next=g.turn+interval; s.warnAt=s.next-SEASON_WARN_LEAD; s.warned=false; delete s.previewUnit;
      return {type:"arrived",count:done,troops:need};
    }
    return null;
  }

  // ---- 다수 세력(B1): 성 없이 야생에서 등장하는 독립 습격대. 각자 고유 주기·병종 편향. ----
  function factionTick(g){
    if(!g.factions) g.factions=FACTIONS.map(f=>({id:f.id,count:1,next:f.interval}));
    const events=[];
    for(const fs of g.factions){
      const f=FACTIONS.find(x=>x.id===fs.id); if(!f||g.turn<fs.next) continue;
      const need=Math.round(f.base*(1+f.growth*(fs.count-1))*(1-dragonSkillSum(g,"factionReduce"))*threatMul(g));   // 위압의 포효(드래곤) + I4 위협 등반
      const t=aiTierOf(g), comp={};
      for(let i=0;i<need;i++){ const u=f.units[Math.floor(Math.random()*f.units.length)], key=uk(u,t); comp[key]=(comp[key]||0)+1; }
      const node=randomTile(g)||"E";
      let target="P";
      if(f.prey){ const exposed=g.armies.filter(a=>a.side==="P"&&a.node!=="P"); if(exposed.length) target=exposed[Math.floor(Math.random()*exposed.length)].node; }
      const e={id:newId(g,"F"),side:"E",node,mp:0,maxMp:0,name:`${f.name} 습격대`,comp,hero:null,role:"attack",target};
      g.armies.push(e); orderMove(g,e.id,target);
      events.push({type:"faction",faction:f.name,troops:need,target});
      fs.count++; fs.next=g.turn+f.interval;
    }
    return events;
  }

  // ---- 온보딩 퀘스트 (초반 빌드 가이드 겸 튜토리얼) ----
  // 선형 체인. done(g)=상태를 받는 순수 조건 함수. 달성 시 questTick 이 보상 지급 후 다음 목표로.
  // 데이터는 여기(단일 소스), 표시는 ui.js renderQuests. 시간모델 무관 → 실시간 전환해도 tick 에서 그대로.
  const QUESTS=[
    {id:"farm",  name:"터전 다지기", desc:"🌾 농장을 지어 식량 수입을 늘리자.",                reward:{목재:15},       done:g=>(g.castle.econ["농장"]||0)>=1},
    {id:"gather",name:"첫 채집대",   desc:"⛏ 부대를 자원지(곡창·삼림 등)로 보내 채집을 시작하자.", reward:{목재:15},       done:g=>g.armies.some(a=>a.side==="P"&&NODES[a.node]&&NODES[a.node].type==="resource")},
    {id:"hunt",  name:"첫 사냥",     desc:"⚔ 약한 둥지(늑대·도적)를 소탕해 경험치를 얻자.",       reward:{철:10},         done:g=>(g.xpItems||0)>=1},
    {id:"barr",  name:"병종 확장",   desc:"🏹 궁수대나 마구간을 지어 병종을 늘리자.",             reward:{식량:20},       done:g=>g.castle.buildings.includes("궁수대")||g.castle.buildings.includes("마구간")},
    {id:"univ",  name:"지식의 전당", desc:"🎓 대학을 지어 연구를 해금하자.",                     reward:{목재:10,철:10}, done:g=>g.castle.buildings.includes("대학")},
    {id:"res",   name:"첫 연구",     desc:"🔬 연구를 하나 완료해 부대를 강화하자.",               reward:{철:15},         done:g=>Object.keys(g.research.done||{}).length>=1},
    {id:"hero",  name:"영웅 영입",   desc:"🍺 선술집을 짓고 새 영웅을 영입하자.",                 reward:{식량:25},       done:g=>g.heroes.length>=3},
    {id:"subdue",name:"토벌 원정",   desc:"☠ 강한 둥지(고블린·오크 진지)를 토벌하자.",            reward:{철:20,석재:20}, done:g=>(g.subdue||0)>=1},
    // E5(중후반 온보딩): 초반 8단계 이후 드래곤·승급·공성·레이드·시즌은 게임 안에서 발견하기 어려워 방치되기 쉬움 —
    // 같은 순차 체인 패턴을 그대로 이어붙여 "다음엔 뭘 해야 하나"를 계속 제시(새 UI 없이 renderQuests 재사용).
    {id:"dragon",name:"용의 동행",   desc:"🐉 드래곤을 부대에 배치해 함께 출전하자.",            reward:{},              dragonScale:10, done:g=>g.armies.some(a=>a.side==="P"&&a.dragon)},
    {id:"promote",name:"영웅 승급",  desc:"⭐ 영웅을 승급시켜 특성을 하나 더 선택하자.",          reward:{},              xp:5,           done:g=>g.heroes.some(h=>h.grade>=3)},
    {id:"siege",name:"공성 준비",    desc:"🏹 파성추를 제작해 성 공략을 준비하자.",              reward:{},              done:g=>(g.castle.siegeItems||0)>=1},
    {id:"raid",name:"고대성 도전",   desc:"🏛 고대성 레이드에 도전해 수성에 성공하자.",           reward:{철:30,석재:30}, done:g=>(g.raidWins||0)>=1},
    {id:"season",name:"시즌 대침공", desc:"🌪 시즌 대침공 예고에 대비해 첫 침공을 막아내자.",      reward:{식량:30,목재:30},done:g=>!!(g.season&&g.season.count>1)},
  ];
  function questTick(g){
    if(!g.quests) g.quests={done:[],idx:0};
    const completed=[];
    while(g.quests.idx<QUESTS.length){
      const q=QUESTS[g.quests.idx];
      if(!q.done(g)) break;
      g.quests.done.push(q.id);
      if(q.reward) for(const r in q.reward) g.res[r]=(g.res[r]||0)+q.reward[r];
      if(q.dragonScale) g.dragonScale=(g.dragonScale||0)+q.dragonScale;   // E5: 자원 종류가 다른 보상(용린/경험치)도 같은 체인에서 지급
      if(q.xp) g.xpItems=(g.xpItems||0)+q.xp;
      g.quests.idx++; completed.push(q);
    }
    return completed;
  }

  // ---- 마일스톤 사다리(A2): 국력 문턱마다 보상·해금 → "다음 목표"가 항상 존재. 순차 달성(퀘스트와 같은 패턴). ----
  // need 값은 newGame() 시작 국력(~98, 영웅 2명·성Lv1 기준)보다 충분히 위에서 시작하도록 봇 플레이테스트(하한선)로 보정:
  // 하한선 봇 기준 T20≈150 · T60≈280 · T150+≈450 대까지 성장(§ sim.js). 실제 플레이는 더 빠름.
  const MILESTONES=[
    {id:"m1",name:"개척지",       need:150, reward:{목재:40,석재:20},                              desc:"국력 150 — 왕국의 기틀을 다졌다."},
    {id:"m2",name:"번영하는 영지", need:280, reward:{식량:60,철:30},               unlock:"slot",  desc:"국력 280 — 운용 부대 수 상한 +1."},
    {id:"m3",name:"무장한 왕국",   need:450, reward:{철:50,석재:40},               unlock:["wall","council"],  desc:"국력 450 — 성벽 보강 상한 +1, 영웅 위원회 자리 +1."},
    {id:"m4",name:"지역의 패자",   need:650, reward:{식량:100,목재:80,철:60},           unlock:"tier4", desc:"국력 650 — 생산 건물 T4(전설) 해금."},
    {id:"m5",name:"왕국의 전설",   need:900, reward:{식량:150,목재:120,석재:100,철:100}, unlock:["slot","tier5"], desc:"국력 900 — 운용 부대 수 상한 +1, 생산 건물 T5(신화) 해금."},
  ];
  // 5단계 이후엔 "왕국 칭호" 순환으로 무한히 이어짐 — 마일스톤이 끝나 "다음 목표"가 사라지는 엔드게임 절벽 방지.
  // need는 직전 값에서 ×1.4씩(지수 성장, 국력 증가 속도를 앞질러 자연히 간격이 벌어짐), 보상도 회차만큼 커짐.
  const TITLES=["남작","자작","백작","후작","공작","대공","왕"];
  function proceduralMilestone(idx){
    const n=idx-MILESTONES.length, last=MILESTONES[MILESTONES.length-1];
    const need=Math.round(last.need*Math.pow(1.4,n+1));
    const cycle=Math.floor(n/TITLES.length)+1, title=TITLES[n%TITLES.length]+(cycle>1?` ${cycle}기`:"");
    const amt=Math.round(40*(1+n*0.5)), reward=Object.fromEntries(RES.map(r=>[r,amt]));
    return {id:"title"+idx, name:`${title} 즉위`, need, reward, desc:`국력 ${need} — 왕국이 ${title}의 반열에 올랐다.`};
  }
  const milestoneAt=idx=>idx<MILESTONES.length ? MILESTONES[idx] : proceduralMilestone(idx);
  function milestoneTick(g){
    if(!g.milestones) g.milestones={done:[],idx:0,unlocked:[]};
    const completed=[], might=computeMight(g);
    while(true){
      const m=milestoneAt(g.milestones.idx); if(might<m.need) break;
      g.milestones.done.push(m.id);
      if(m.reward) for(const r in m.reward) g.res[r]=(g.res[r]||0)+m.reward[r];
      if(m.unlock) for(const u of (Array.isArray(m.unlock)?m.unlock:[m.unlock])) g.milestones.unlocked.push(u);
      addSeasonScore(g,40);   // I3: 성장(마일스톤 달성)도 시즌 점수
      g.milestones.idx++; completed.push(m);
    }
    return completed;
  }

  // ---- 드래곤(C1) 단계 진행: 용린 누적에 따라 순차 성장(퀘스트/마일스톤과 같은 패턴) ----
  // F3: 스킬은 더 이상 단계 상승에 묶이지 않음 — 용린이 SKILL_POINT_GAP만큼 쌓일 때마다 포인트 지급(성체 도달 후에도 계속 성장 가능).
  const SKILL_POINT_GAP=30;
  function dragonTick(g){
    if(!g.dragon) g.dragon={stage:0,skills:[],skillPoints:0,scaleSpent:0};
    if(g.dragon.skillPoints===undefined) g.dragon.skillPoints=0;
    if(g.dragon.scaleSpent===undefined) g.dragon.scaleSpent=0;
    const completed=[];
    while(g.dragon.stage<DRAGON_STAGES.length-1 && (g.dragonScale||0)>=DRAGON_STAGES[g.dragon.stage+1].need){

    const reachable = reach[id]!==undefined && id!==selNode;
    let stroke="#0b1220", sw=1;
    if(onPath[id]){stroke="#f59e0b";sw=2.5;} else if(reachable){stroke="#fbbf24";sw=1.5;}
    svg.appendChild(el("rect",{x:px+1.5,y:py+1.5,width:TS-3,height:TS-3,rx:6,fill:tileFill(n),stroke,"stroke-width":sw,
      class:"node-hit","data-node":id,...(reachable?{"data-go":id}:{}),style:"cursor:pointer"}));
    if(n.type==="castle")svg.appendChild(el("rect",{x:px+3,y:py+3,width:TS-6,height:TS-6,rx:5,fill:"none",stroke:n.owner==="P"?"#3b82f6":"#ef4444","stroke-width":2.5,"pointer-events":"none"}));
    if(n.type==="ancient")svg.appendChild(el("rect",{x:px+3,y:py+3,width:TS-6,height:TS-6,rx:5,fill:"none",stroke:n.owner==="P"?"#3b82f6":n.owner==="E"?"#ef4444":"#c4b5fd","stroke-width":2.5,"stroke-dasharray":n.owner?"none":"4 3","pointer-events":"none"}));
    if(n.type!=="plain"){
      const ic=el("text",{x,y:y-2,"text-anchor":"middle","font-size":18,"pointer-events":"none"});
      ic.textContent=n.type==="castle"?"🏰":n.type==="ancient"?"🏛":n.type==="resource"?"◆":"☠"; svg.appendChild(ic);
      const lb=el("text",{x,y:y+16,"text-anchor":"middle","font-size":8.5,fill:"#94a3b8","pointer-events":"none"});
      lb.textContent=n.res?n.res:(n.name.length>5?n.name.slice(0,4):n.name); svg.appendChild(lb);
    }
    // 레이드 수성 진행
    if(n.type==="ancient" && state.raid.holder && state.raid.holdTurns>0){
      const rb=el("text",{x,y:py-2,"text-anchor":"middle","font-size":10,"font-weight":"800","pointer-events":"none",fill:state.raid.holder==="P"?"#93c5fd":"#fca5a5"});
      rb.textContent=`🛡${state.raid.holdTurns}/${state.raid.need}`; svg.appendChild(rb);
    }
    // 둥지 재생성 카운트다운
    if(n.type==="den" && !armiesAt(id).some(a=>a.side==="M")){
      const rs=(state.respawns||[]).find(r=>r.node===id);
      if(rs){const t=el("text",{x,y:py-2,"text-anchor":"middle","font-size":9,"pointer-events":"none",fill:"#c4b5fd"});t.textContent=`⏳${Math.max(0,rs.at-state.turn)}`;svg.appendChild(t);}
    }
    // 채집 표시
    const g=armiesAt(id).map(gatherOf).filter(Boolean).reduce((s,g)=>s+g.amt,0);
    if(g>0){const t=el("text",{x,y:py-2,"text-anchor":"middle","font-size":10,fill:"#4ade80","font-weight":"700","pointer-events":"none"});t.textContent=`⛏+${g}`;svg.appendChild(t);}
  }
  for(const a of state.armies){
    let [x,y]=COORDS[a.node]; const others=armiesAt(a.node);
    if(a.dest&&a.path){const _i=a.path.indexOf(a.node),_nx=a.path[_i+1];   // 타일 사이 위치 보간(진행도)
      // 유저 피드백: 틱 사이(10초)에 화면이 통째로 멈춰 보임 — 실제 틱값(a.moveProg)에 "이번 틱 시작 후 지난 실제 시간" 만큼의
      // 예상 진행분을 더해 매 프레임 조금씩 앞으로 미리 보여줌(다음 틱이 오면 실제값으로 자연히 맞춰짐, 되돌아가지 않게 상한).
      if(_nx&&COORDS[_nx]){ let _p=Math.max(0,Math.min(1,a.moveProg||0));
        if(!rtPaused&&typeof tickBarSince!=="undefined"){ const extra=Game.armySpeed(state,a)*((Date.now()-tickBarSince)/(RT_BASE/rtSpeed)); _p=Math.max(0,Math.min(1,_p+Math.max(0,extra))); }
        x+=(COORDS[_nx][0]-x)*_p;y+=(COORDS[_nx][1]-y)*_p;}}
    const idx=others.indexOf(a), off=others.length>1?(idx-(others.length-1)/2)*26:0;
    const ax=x+off,ay=y-2;
    const sel = state.selected?.kind==="army"&&state.selected.id===a.id;
    const col = a.side==="P"?"#3b82f6":a.side==="M"?"#7c3aed":"#ef4444";
    const glow= a.side==="P"?"#93c5fd":a.side==="M"?"#c4b5fd":"#fca5a5";
    if(sel){ // 선택 강조: 헤일로 + 굵은 금색 링
      svg.appendChild(el("circle",{cx:ax,cy:ay,r:23,fill:col,opacity:0.20}));
      svg.appendChild(el("circle",{cx:ax,cy:ay,r:18,fill:"none",stroke:"#fbbf24","stroke-width":3.5}));
    } else if(a.side!=="P"){ // 적·몬스터: 외곽 링으로 잘 보이게
      svg.appendChild(el("circle",{cx:ax,cy:ay,r:16,fill:"none",stroke:glow,"stroke-width":2,opacity:0.55}));
    }
    const grp=el("g",{class:"army","data-army":a.id});
    if(a.side!=="P") grp.setAttribute("pointer-events","none"); // 적 토큰 클릭 통과 → 노드가 대상
    grp.appendChild(el("circle",{cx:ax,cy:ay,r:13,fill:col,stroke:"#0b1220","stroke-width":2.5}));
    const t=el("text",{x:ax,y:ay+4.5,"text-anchor":"middle","font-size":12,fill:"#fff","font-weight":"800","pointer-events":"none"});
    t.textContent=a.side==="P"?"⚔":a.side==="M"?"☠":"✕";grp.appendChild(t);
    svg.appendChild(grp);
    // 병력 수 배지 (우하단)
    const cnt=troops(a), bw=cnt>=10?21:16;
    svg.appendChild(el("rect",{x:ax+5,y:ay+4,width:bw,height:14,rx:7,fill:"#0b1220",stroke:col,"stroke-width":1.5,"pointer-events":"none"}));
    const ct=el("text",{x:ax+5+bw/2,y:ay+14,"text-anchor":"middle","font-size":10,fill:"#fff","font-weight":"700","pointer-events":"none"}); ct.textContent=cnt; svg.appendChild(ct);
    if(a.hero){const h=el("text",{x:ax-13,y:ay-7,"font-size":13,"pointer-events":"none",fill:"#fbbf24"});h.textContent="★";svg.appendChild(h);}
    // 선택 부대 이름 라벨 (위)
    if(sel){ const nm=a.name, w=nm.length*12+16;
      svg.appendChild(el("rect",{x:ax-w/2,y:ay-40,width:w,height:19,rx:9,fill:"#fbbf24","pointer-events":"none"}));
      const nt=el("text",{x:ax,y:ay-26,"text-anchor":"middle","font-size":11,fill:"#1a1200","font-weight":"800","pointer-events":"none"});nt.textContent=nm;svg.appendChild(nt);
    }
  }
  if(state.pendingMove){ // 노드 옆 확정/취소 팝업 (최상단)
    const pm=state.pendingMove, tx=COORDS[pm.target][0], ty=COORDS[pm.target][1];
    const okg=el("g",{"data-confirm":"1",style:"cursor:pointer"});
    okg.appendChild(el("rect",{x:tx-54,y:ty-56,width:66,height:26,rx:8,fill:"#111827",stroke:pm.attack?"#ef4444":"#f59e0b","stroke-width":2}));
    const okl=el("text",{x:tx-21,y:ty-39,"text-anchor":"middle","font-size":12,fill:pm.attack?"#f87171":"#fbbf24","font-weight":"700","pointer-events":"none"});
    okl.textContent=pm.attack?"⚔️ 공격":"✓ 이동"; okg.appendChild(okl); svg.appendChild(okg);
    const nog=el("g",{"data-cancel":"1",style:"cursor:pointer"});
    nog.appendChild(el("rect",{x:tx+15,y:ty-56,width:34,height:26,rx:8,fill:"#111827",stroke:"#475569","stroke-width":2}));
    const nol=el("text",{x:tx+32,y:ty-39,"text-anchor":"middle","font-size":13,fill:"#94a3b8","pointer-events":"none"}); nol.textContent="✕"; nog.appendChild(nol); svg.appendChild(nog);
  }
  attach();
}
/* ==== ui.js 인라인 (build.js 생성, 직접 수정 금지) ==== */
/* =====================================================================
   mini4x 공유 UI — 자원바·성 내정 패널·이동/전투·저장/불러오기·턴 처리
   - 노드판(app_economy)·타일판(app_tilemap)이 이 하나를 공유(단일 UI 소스).
   - 맵별로 다른 부분(COORDS·renderMap)은 각 템플릿 head 에 있음.
   - build.js 가 //__UI__ 자리에 인라인.
   ===================================================================== */
// E2: 몬스터별 전투 역할 힌트(engine.js kind/proc 재배정과 짝 — 순수 표시용, 로직 없음).
const MONSTER_ROLE={하피:"기습형",오우거:"돌격형"};
function renderResBar(){
  const inc=income();
  document.getElementById('resbar').innerHTML=RES.map(r=>{
    const v=inc[r];
    return `<span class="res">${r} <b>${state.res[r]}</b> <span class="inc" style="${v<0?'color:#fca5a5':''}">${v>=0?'+':''}${v}</span></span>`;
  }).join("")
    +`<span class="res" style="border-color:#c4b5fd;color:#c4b5fd">🏵 토벌 <b>${state.subdue||0}</b></span>`
    +`<span class="res" style="border-color:#fbbf24;color:#fbbf24">📜 경험치 <b>${state.xpItems||0}</b></span>`
    +`<span class="res" style="border-color:var(--blue);color:var(--blue)">⚔ 국력 <b>${Game.computeMight(state)}</b> <span class="k">(적 ${Game.enemyMight(state)})</span></span>`
    +(Game.myRank?`<span class="res" style="border-color:var(--gold);color:var(--gold)">🏆 대륙 <b>#${Game.myRank(state)}</b><span class="k">/${(state.rivals?state.rivals.length:0)+1}</span></span>`:"")
    +`<span class="res" style="border-color:#c084fc;color:#c084fc">🐉 용린 <b>${state.dragonScale||0}</b></span>`;
  document.getElementById('turn').textContent=state.turn;
}
// 📱 모바일 하단 퀵바(3칸) — 유저 피드백: "탭해서 펼치기/접기"뿐인 손잡이 대신, 목표·내정·선택 대상을 바로 보여주고 탭하면 그 화면으로.
// 데스크톱은 .sheet-handle이 display:none이라 무해(렌더는 하되 안 보임).
function renderQuickBar(){
  const qq=document.getElementById('qcQuest'), qc=document.getElementById('qcCastle'), qd=document.getElementById('qcDeploy'), qs=document.getElementById('qcSel');
  if(!qq) return;   // 구버전 템플릿(마크업 없음) 방어
  const Q=Game.QUESTS, q=state.quests||{idx:0};
  qq.textContent = (Q&&q.idx<Q.length) ? `📋 목표 ${q.idx+1}/${Q.length}` : `🏆 대륙 #${Game.myRank?Game.myRank(state):"?"}`;
  qc.textContent = `🏰 내정 Lv.${state.castle.level}`;
  if(qd) qd.textContent = `⚔ 부대출전 ${Game.pArmyCount?Game.pArmyCount(state):""}`.trim();
  const s=state.selected;
  qs.textContent = !s ? "🗺 지도에서 선택"
    : s.kind==="army" ? `⚔ ${A(s.id)?.name||"부대"}`
    : `📍 ${NODES[s.id]?.name||"위치"}`;
}
// 🏅 다음 마일스톤(A2) — 국력 진행바. 전부 달성하면 숨김.
function renderMilestone(){
  const ms=state.milestones||{idx:0};
  const cur=Game.milestoneAt(ms.idx), might=Game.computeMight(state), pct=Math.min(100,Math.round(100*might/cur.need));
  const rw=cur.reward&&Object.keys(cur.reward).length?Object.entries(cur.reward).map(([r,v])=>`${r[0]}+${v}`).join(" "):"";
  return `<div style="background:var(--bg);border:1px solid var(--blue);border-radius:10px;padding:8px 10px;margin-bottom:10px">
    <div style="font-size:11px;color:var(--blue)">🏅 다음 마일스톤 <b>${cur.name}</b> <span class="k">(국력 ${might}/${cur.need})</span></div>
    <div class="k" style="font-size:12px;margin-top:2px">${cur.desc}</div>
    <div style="height:5px;background:var(--line);border-radius:3px;margin-top:5px"><div style="height:100%;width:${pct}%;background:var(--blue);border-radius:3px"></div></div>
    ${rw?`<div style="font-size:11px;color:var(--green);margin-top:3px">✦ 보상 ${rw}</div>`:""}
  </div>`;
}
// 🗓 시즌형 침공(B2) — 다음 대침공까지 남은 턴. 예고 상태면 붉게 강조.
function renderSeason(){
  const s=state.season; if(!s) return "";
  const left=Math.max(0,s.next-state.turn);
  const hint=s.warned&&s.previewUnit?` · 예상 주력 <b>${s.previewUnit}</b>`:"";
  // G-F: 예고 중 + 나가있는 부대가 있으면 "전군 소집" 버튼 — 사냥 나간 부대를 불러 방어 준비.
  const away=state.armies.filter(a=>a.side==="P"&&a.node!=="P").length;
  const rally=(s.warned&&away>0)?`<button class="minibtn" id="rallyBtn" style="margin-top:6px;border-color:var(--red);color:#fca5a5">⚔ 전군 소집 (${away}개 부대 귀환)</button>`:"";
  return `<div style="background:var(--bg);border:1px solid ${s.warned?'var(--red)':'var(--line)'};border-radius:10px;padding:8px 10px;margin-bottom:10px">
    <div style="font-size:11px;color:${s.warned?'#fca5a5':'#94a3b8'}">${s.warned?"⚠ 대침공 예고!":"🗓 다음 시즌"} <b>${s.count}차</b> <span class="k">— ${left}턴 후 도착</span>${hint}</div>
    ${rally}
  </div>`;
}
// 🏴 알려진 습격 세력 — 이름·주력 병종을 상시 표시(정보 없이 오는 위협이 아니게).
function renderFactionInfo(){
  if(!Game.FACTIONS||!Game.FACTIONS.length) return "";
  return `<div style="font-size:10px;color:#64748b;margin:-4px 0 10px 2px">🏴 알려진 습격 세력: ${Game.FACTIONS.map(f=>`${f.name}(${f.units.join("·")}${f.prey?" · 야외 부대 노림":""})`).join(" · ")}</div>`;
}
// 🎯 온보딩 퀘스트 — 현재 목표를 패널 최상단에 상시 표시(선택 상태 무관). 데이터는 Game.QUESTS.
function renderQuests(){
  const Q=Game.QUESTS, q=state.quests||{idx:0};
  if(!Q||q.idx>=Q.length) return "";   // 전부 완료 → 숨김
  const cur=Q[q.idx];
  const rw=[cur.reward?Object.entries(cur.reward).map(([r,v])=>`${r[0]}+${v}`).join(" "):"",
    cur.dragonScale?`용린+${cur.dragonScale}`:"", cur.xp?`경험치+${cur.xp}`:""].filter(Boolean).join(" ");
  return `<div style="background:var(--bg);border:1px solid var(--gold);border-radius:10px;padding:8px 10px;margin-bottom:10px">
    <div style="font-size:11px;color:var(--gold)">🎯 목표 <b>${q.idx+1} / ${Q.length}</b></div>
    <div style="font-weight:700;margin:2px 0">${cur.name}</div>
    <div class="k" style="font-size:12px">${cur.desc}</div>
    ${rw?`<div style="font-size:11px;color:var(--green);margin-top:3px">✦ 보상 ${rw}</div>`:""}
  </div>`;
}
// 🏆 대륙 랭킹(I1) — 내 국력 vs 라이벌 왕국. 방치하면 추월당하고 꺾으면 순위↑.
function renderRankings(){
  if(!Game.continentalRankings) return "";
  const list=Game.continentalRankings(state), max=Math.max(1,...list.map(x=>x.might));
  const rows=list.map((x,i)=>{
    const w=Math.round(100*x.might/max), col=x.me?"var(--gold)":"#94a3b8";
    return `<div style="display:flex;align-items:center;gap:6px;margin:2px 0">
      <span style="width:16px;text-align:right;color:${col};font-size:11px">${i+1}</span>
      <span style="flex:1;min-width:0">
        <span style="font-size:11px;color:${col}">${x.me?"👑 ":""}${x.name}${x.bias?` <span class="k">·${x.bias}</span>`:""} <b>${x.might}</b></span>
        <div style="height:4px;background:var(--line);border-radius:2px;margin-top:1px"><div style="height:100%;width:${w}%;background:${x.me?'var(--gold)':'#475569'};border-radius:2px"></div></div>
      </span></div>`;
  }).join("");
  return `<div style="margin-bottom:8px">
    <div style="font-size:11px;color:var(--gold);margin-bottom:4px">🏆 대륙 랭킹 <span class="k">— 국력으로 겨루는 왕국들</span></div>
    ${rows}
  </div>`;
}
// 🏆 경쟁 시즌(I3) — 현재 시즌 점수·티어·남은 턴. 처치·방어·라이벌 격파로 점수를 쌓아 시즌 종료 시 랭크 보상.
function renderRankSeason(){
  const rs=state.rankSeason; if(!rs||!Game.tierForScore) return "";
  const tier=Game.tierForScore(rs.score||0), tiers=Game.RANK_TIERS, idx=tiers.findIndex(x=>x.id===tier.id), next=tiers[idx+1];
  const left=Math.max(0, rs.next-state.turn), score=Math.round(rs.score||0);
  const pct=next?Math.min(100,Math.round(100*(score-tier.min)/(next.min-tier.min))):100;
  const toNext=next?`${next.name}까지 ${Math.max(0,next.min-score)}점`:"최고 티어 도달";
  return `<div>
    <div style="font-size:11px;color:#c084fc">🏆 경쟁 시즌 <b>${rs.num}</b> · 현재 <b>${tier.name}</b> <span class="k">(${score}점 · ${left}턴 남음)</span></div>
    <div style="height:5px;background:var(--line);border-radius:3px;margin-top:5px"><div style="height:100%;width:${pct}%;background:#c084fc;border-radius:3px"></div></div>
    <div class="k" style="font-size:11px;margin-top:3px">${toNext} · 처치·방어·라이벌 격파로 점수↑</div>
  </div>`;
}
// 🏆 경쟁 요약(랭킹+시즌 통합, 기본 접힘) — I1~I3로 아코디언이 길어져 모바일 스크롤 부담 → 한 줄 요약+접이식으로.
function renderCompetition(){
  if(!Game.continentalRankings) return "";
  const open=state.compOpen===true;
  const rank=Game.myRank(state), total=(state.rivals?state.rivals.length:0)+1;
  const rs=state.rankSeason, tier=rs&&Game.tierForScore?Game.tierForScore(rs.score||0).name:"";
  return `<div style="background:var(--bg);border:1px solid var(--gold);border-radius:10px;padding:8px 10px;margin-bottom:10px">
    <div id="compToggle" style="cursor:pointer;font-size:11px;color:var(--gold);display:flex;justify-content:space-between;align-items:center">
      <span>🏆 대륙 #${rank}/${total} · 시즌${rs?rs.num:1} ${tier}</span><span>${open?"▲":"▼"}</span>
    </div>
    ${open?`<div style="margin-top:6px">${renderRankings()}${renderRankSeason()}</div>`:""}
  </div>`;
}
// ℹ️ 게임 설명 — 원래 지도 아래 항상 떠 있던 문단. 유저 피드백: 화면 공간을 잡아먹는다 → 접이식으로 이전(기본 접힘).
function renderAbout(){
  const open=state.aboutOpen===true;
  return `<div style="margin-bottom:10px">
    <div id="aboutToggle" style="cursor:pointer;font-size:11px;color:var(--dim);display:flex;justify-content:space-between;align-items:center">
      <span>ℹ️ 게임 설명</span><span>${open?"▲":"▼"}</span>
    </div>
    ${open?`<div class="k" style="font-size:12px;margin-top:4px">채집·생산으로 국력을 키우는 <b>지속형 왕국</b>. 적 성 함락·고대성 레이드는 게임오버가 아니라 보상+마일스톤으로 이어지는 사건 — 왕국은 계속 성장합니다. 부대가 적과 만나면 전투 엔진으로 교전하고, 성 수비는 성벽 보정을 받습니다.</div>`:""}

}

function attach(){
  svg.querySelectorAll('[data-confirm]').forEach(g=>g.onclick=e=>{e.stopPropagation();confirmMove();});
  svg.querySelectorAll('[data-cancel]').forEach(g=>g.onclick=e=>{e.stopPropagation();cancelMove();});
  svg.querySelectorAll('[data-army]').forEach(g=>g.onclick=e=>{e.stopPropagation();
    const a=A(g.dataset.army), sel=state.selected?.kind==="army"?A(state.selected.id):null;
    // 아군 부대 선택 중 다른 노드 클릭(아군 토큰 포함) → 그 노드로 이동 예약
    if(sel && sel.side==="P" && a.node!==sel.node){
      const {dist}=dijkstra(sel.node,99);
      if(dist[a.node]!==undefined){ stageMove(a.node); return; }
    }
    state.pendingMove=null; state.selected={kind:"army",id:a.id}; render();});
  svg.querySelectorAll('[data-go]').forEach(c=>c.onclick=e=>{e.stopPropagation();stageMove(c.dataset.go);});
  svg.querySelectorAll('[data-node]').forEach(c=>c.onclick=e=>{e.stopPropagation();
    const sel=state.selected?.kind==="army"?A(state.selected.id):null;
    if(sel && sel.side==="P"){ const {dist}=dijkstra(sel.node,99);
      if(dist[c.dataset.node]!==undefined && c.dataset.node!==sel.node){ stageMove(c.dataset.node); return; } }
    state.pendingMove=null; state.selected={kind:"node",id:c.dataset.node};
    if(NODES[c.dataset.node].type==="castle"&&NODES[c.dataset.node].owner==="P") state.castleTab="출전";   // 유저 요청: 타일 탭 → 바로 출전 화면
    render();});
}
function stageMove(target){ // 1단계: 목적지 미리보기 (확정 전엔 명령 안 내림)
  if(state.over) return;
  const a=A(state.selected?.id); if(!a) return;
  const {dist,prev}=dijkstra(a.node,99);
  if(dist[target]===undefined||target===a.node){toast("도달 불가");return;}
  state.pendingMove={armyId:a.id,target,path:pathTo(target,prev),cost:dist[target],
    attack:armiesAt(target).some(x=>x.side!=="P")};
  render();
}
function confirmMove(){ // 2단계: 확정 → 진군 명령. 부대가 여러 틱에 걸쳐 스스로 이동(▶ 재생/한 틱).
  const pm=state.pendingMove; if(!pm||state.over) return;
  const m=Game.orderMove(state,pm.armyId,pm.target);
  state.pendingMove=null; state.mode="normal";
  if(!m) state.selected=null;   // 명령 성공 → 선택 해제(도달 타일 하이라이트 끔)
  toast(m||`🚩 ${NODES[pm.target].name} 방면 진군 — ▶ 재생으로 시간을 흘려 이동`);
  render();
}

  box.innerHTML = pm

    : "";
}

function composerHTML(){
  const gar=state.castle.garrison, draft=state.castle.draft;
  const draftTotal=Object.values(draft).reduce((x,y)=>x+y,0), garTotal=Object.values(gar).reduce((x,y)=>x+y,0);
  const acap=Game.armySlots(state), acur=Game.pArmyCount(state), afull=!Game.canAddArmy(state);
  let h=`<div class="k" style="margin-bottom:4px">🚩 출전 편성 <span class="k">(주둔 ${garTotal} · 부대 <span style="color:${afull?'#fca5a5':'#cbd5e1'}">${acur}/${acap}</span>)</span></div>`;
  if(afull) h+=`<div class="k" style="font-size:11px;color:#fca5a5">부대 수 상한 도달 — 성 레벨업·군제 개편 연구로 확대</div>`;
  h+=renderPresetQuick();
  if(garTotal===0 && draftTotal===0) return h+`<div class="k" style="font-size:12px">주둔 병력 없음 — 성에서 생산하세요.</div>`;
  const tiersUsed=[]; for(let t=1;t<=TIER_MAX;t++){ if(ALL_UNITS.some(u=>(gar[Game.uk(u,t)]||0)+(draft[Game.uk(u,t)]||0)>0)) tiersUsed.push(t); }
  h+=`<div class="compgrid" style="grid-template-columns:26px repeat(${ALL_UNITS.length},1fr)">
    <div></div>${ALL_UNITS.map(u=>`<div class="gh" title="${u}">${GROUP_ICON[GROUPS.보병.includes(u)?"보병":GROUPS.궁병.includes(u)?"궁병":"기병"]}${SHORT_NAME[u]||u}</div>`).join("")}`;
  for(const t of tiersUsed){
    h+=`<div class="gh">T${t}</div>`;
    for(const u of ALL_UNITS){ const key=Game.uk(u,t), avail=gar[key]||0, d=draft[key]||0;
      if(avail<=0 && d<=0){ h+=`<div class="gcell empty">–</div>`; continue; }
      h+=`<div class="gcell">
        <button class="gbtn" data-draft="${key}" data-d="1" ${d>=avail||draftTotal>=Game.armyCapFor(state)?"disabled":""}>＋</button>
        <div class="gn">${d}<span class="k" style="font-size:8px">/${avail}</span></div>
        <button class="gbtn" data-draft="${key}" data-d="-1" ${d<=0?"disabled":""}>−</button>
      </div>`;
    }
  }
  h+=`</div>`;
  return h+`<div class="k" style="font-size:12px;margin-top:4px">편성 ${draftTotal}/${Game.armyCapFor(state)}</div>`;
}

  const heroLine=(sum.heroA||sum.heroB)?`<div class="res-line" style="color:var(--gold);font-size:12px">${[sum.heroA?`공격 ${stars(sum.gradeA)} ${sum.heroA}(+${sum.buffA}%)`:"",sum.heroB?`수비 ${stars(sum.gradeB)} ${sum.heroB}(+${sum.buffB}%)`:""].filter(Boolean).join(" · ")}</div>`:"";

  const enrageLine=sum.enrageLoss?`<div class="res-line" style="color:#f87171;font-size:12px">💢 고대 생물이 포효하며 선제 강타! 공격측 병력 -${sum.enrageLoss}%</div>`:"";
  // E3(전투 연출): 라운드 수·특수 발동·창병 요격 총계 + 승패 마진 태그로 "어떤 전투였는지" 체감 강화
  const marginTag=sum.margin?` · ${MARGIN_TAG[sum.margin]}`:"";
  const detailBits=[sum.rounds!=null?`${sum.rounds}R 만에 결판`:"",sum.totalProc?`특수 ${sum.totalProc}회`:"",sum.totalCounter?`창병 요격 ${sum.totalCounter}회`:""].filter(Boolean).join(" · ");
  const detailLine=detailBits?`<div class="res-line k" style="font-size:12px">${detailBits}${marginTag}</div>`:"";
  showModal(`<h2>⚔️ 전투</h2>
    <div class="res-line">${sum.attacker} <span class="k">→</span> ${sum.defender}${sum.fort?' <span class="k">(방어 보정)</span>':''}</div>
    ${enrageLine}${heroLine}${dragonLine}
    <div class="res-line">${tag}</div><div class="res-line"><b>${sum.result}</b></div>
    ${detailLine}
    <div class="res-line k">생존 — 공격 ${sum.survA} · 수비 ${sum.survB}</div>
    <button class="minibtn" id="modalClose">확인</button>`);
}
// 🌍 세계 이벤트(A3, 정복·함락·레이드)는 stepTurn에서 배너/토스트로 직접 처리 — 재생을 끊지 않으려 모달을 쓰지 않는다(유저 요청).

/* ===== 저장/불러오기 ===== */
const SAVE_KEY="mini4x_save_v1", UI_FIELDS=["selected","pendingMove","mode","castleTab","prodTier","infoOpen","lordTab","compOpen","aboutOpen"];
function saveSnapshot(){const o={...state,ancientOwner:NODES.ANCIENT.owner,savedAt:Date.now()};for(const f of UI_FIELDS)delete o[f];return JSON.parse(JSON.stringify(o));}
function applySave(data){
  if(typeof rtStop==="function")rtStop();   // 로드/새게임 시 실시간 루프 정지
  hideModal();                              // 열려있던 전투/종료 모달 닫기
  if(typeof resetMapPan==="function")resetMapPan();   // 새 판/불러오기 시 지도 팬 위치 초기화
  closeSheet();
  for(const k in state){if(!UI_FIELDS.includes(k))delete state[k];}
  Object.assign(state,data); NODES.ANCIENT.owner=data.ancientOwner!==undefined?data.ancientOwner:null; delete state.ancientOwner;
  state.selected=null;state.pendingMove=null;state.mode="normal"; state.castleTab=state.castleTab||"건물"; state.prodTier=state.prodTier||{};
  state.infoOpen=state.infoOpen!==false;
  state.quests=state.quests||{done:[],idx:0};   // 구버전 세이브 호환
  state.milestones=state.milestones||{done:[],idx:0,unlocked:[]};   // 구버전 세이브 호환(A2)
  state.raidBossGen=state.raidBossGen||0;
  if(state.raid) state.raid.settled=state.raid.settled||false;   // 구버전 세이브 호환 — 고대성 점거 1회 발동 플래그
  state.ai=state.ai||{budget:0}; if(state.ai.lastWave==null)state.ai.lastWave=-99;   // 구버전 세이브 호환 — 웨이브 간격 추적
  state.castle.presets=state.castle.presets||[null,null,null];   // 구버전 세이브 호환 — 편성 즐겨찾기 3슬롯
  if(state.castle.autoDeploy==null)state.castle.autoDeploy=false; state.castle.autoDeployNext=state.castle.autoDeployNext||"hunt";   // 구버전 세이브 호환 — 자동 출전
  state.rivals=state.rivals||Game.RIVALS.map(r=>({id:r.id,might:r.base})); state.rivalKills=state.rivalKills||0;   // 구버전 세이브 호환 — 라이벌 왕국(I1)
  state.rankSeason=state.rankSeason||{num:1,next:state.turn+Game.RANK_SEASON_LEN,score:0,bestRank:99,tierHist:[]};   // 구버전 세이브 호환 — 경쟁 시즌(I3)
  state.season=state.season||{count:1,next:state.turn+60,warnAt:state.turn+48,warned:false};   // 구버전 세이브 호환(B2)
  state.factions=state.factions||Game.FACTIONS.map(f=>({id:f.id,count:1,next:state.turn+f.interval}));   // 구버전 세이브 호환(B1)
  state.pendingPromote=state.pendingPromote||null;   // 구버전 세이브 호환(C2)
  state.dragon=state.dragon||{stage:0}; state.dragon.skills=state.dragon.skills||[]; state.dragonScale=state.dragonScale||0;   // 구버전 세이브 호환(C1)
  state.dragon.skillPoints=state.dragon.skillPoints||0; state.dragon.scaleSpent=state.dragon.scaleSpent||0;   // 구버전 세이브 호환(F3)
  delete state.pendingDragonSkill;   // F3: 2択 폐기 — 남아있던 필드 정리
  // F3: 구 스킬 id(단일명)→신 id(Ⅰ접미사) 1회 이관 — 안 하면 구 세이브의 스킬이 조용히 무효화됨
  { const MIG={flame:"flame1",scale:"scale1",hunter:"hunter1",roar:"roar1"};
    state.dragon.skills=state.dragon.skills.map(id=>MIG[id]||id); }
  // F4: 구버전 세이브 호환 — 군주 필드가 없으면 기본값 채움
  state.lord=state.lord||{level:1,xp:0,talentPoints:0,talents:{},equipment:{}};
  state.lord.talents=state.lord.talents||{}; state.lord.equipment=state.lord.equipment||{};
  state.lordInventory=state.lordInventory||[]; state.materials=state.materials||0; state.blueprints=state.blueprints||0;
  (state.heroes||[]).forEach(h=>{ if(h.trait&&!h.traits) h.traits=[h.trait]; delete h.trait; if(!h.traits) h.traits=[]; });   // hero.trait(단일)→traits(배열) 1회 이관(C2)
  // F1: castle.queue가 구버전 단일 배열이면 건물별 오브젝트로 재분배(유닛 유실 방지)
  if(Array.isArray(state.castle.queue)){ const old=state.castle.queue; state.castle.queue={};
    for(const u of old){ const b=Game.UNIT_BLD[Game.baseOf(u)]; if(b) (state.castle.queue[b]=state.castle.queue[b]||[]).push(u); } }
  state.castle.autoProduce=state.castle.autoProduce||{};   // G-C: 구버전 세이브 호환
  state.castle.trainProg=state.castle.trainProg||{};   // 생산시간: 구버전 세이브 호환
  document.getElementById('endturn').disabled=!!state.over; render();
}
function saveLocal(silent){try{localStorage.setItem(SAVE_KEY,JSON.stringify(saveSnapshot()));if(!silent)toast("💾 저장됨 (이 브라우저)");return true;}catch(e){if(!silent)toast("⚠ 브라우저 저장 불가 — ⬇ 파일로 내보내세요");return false;}}
function loadLocal(){try{const s=localStorage.getItem(SAVE_KEY);if(!s){toast("저장된 판이 없습니다");return;}
  const data=JSON.parse(s); applySave(data); toast("📂 불러왔습니다 — 턴 "+state.turn); offlineCatchup(data);
}catch(e){toast("⚠ 불러오기 실패");}}

  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download="mini4x_턴"+state.turn+".json";a.click();URL.revokeObjectURL(a.href);toast("⬇ 세이브 파일 내보냄");}

  applySave(data); toast("⬆ 가져왔습니다 — 턴 "+state.turn); offlineCatchup(data);
}catch(e){toast("⚠ 파일 형식 오류");}};r.readAsText(file);}
// ---- 오프라인 누적(A4) — 실시각(Date.now())은 여기(ui.js)에서만 다룸. 계산 자체는 game.js의 순수 offlineTick.
const OFFLINE_MAX_HOURS=24;   // 방치형: 한 번에 인정하는 오프라인 시간 상한(스태미나 없음, 상한만 조정)
function offlineCatchup(data){
  if(!data.savedAt||state.over) return;
  const elapsedMs=Date.now()-data.savedAt;
  const ticks=Math.floor(Math.min(elapsedMs,OFFLINE_MAX_HOURS*3600*1000)/RT_BASE);
  if(ticks<1) return;
  const r=Game.offlineTick(state,ticks);   // H2/H4: 경제+자동사냥+견제까지 정산, 리포트 반환
  render(); saveLocal(true);
  const hrs=elapsedMs/3600000;
  const resLine=Game.RES.map(k=>(r.resGain&&r.resGain[k])?`${k} ${r.resGain[k]>0?"+":""}${r.resGain[k]}`:null).filter(Boolean).join(" · ")||"변동 없음";
  const rw=r.huntRewards?Object.entries(r.huntRewards).map(([k,v])=>`${k}+${v}`).join(" · "):"";
  let h=`<div class="res-line">약 ${hrs<1?Math.round(hrs*60)+"분":hrs.toFixed(1)+"시간"} 동안 <b>${r.turns}틱</b> 자동 진행.</div>`;
  h+=`<div class="res-line k">📦 자원 ${resLine}</div>`;
  if(r.hunts) h+=`<div class="res-line" style="color:var(--green)">⚔ 자동 사냥 ${r.hunts}회${rw?` — ${rw}`:""}</div>`;
  if(r.skirmishes) h+=`<div class="res-line" style="color:${r.lostArmies?'var(--red)':'var(--blue)'}">🛡 견제 전투 ${r.skirmishes}회 · 방어 성공 ${r.skirmishWins}${r.lostArmies?` · 부대 손실 ${r.lostArmies} ⚠`:""}</div>`;
  if(r.built&&r.built.length) h+=`<div class="res-line">🏗 건설 완료 — ${r.built.join(", ")}</div>`;
  if(r.research&&r.research.length) h+=`<div class="res-line">🔬 연구 완료 — ${r.research.join(", ")}</div>`;
  if(r.seasonEnds) h+=`<div class="res-line" style="color:#c084fc">🏆 경쟁 시즌 ${r.seasonEnds}회 마감${r.lastTier?` — 최근 ${r.lastTier}`:""}</div>`;
  if(r.rankBefore&&r.rankAfter&&r.rankBefore!==r.rankAfter) h+=`<div class="res-line" style="color:${r.rankAfter<r.rankBefore?'var(--gold)':'#fca5a5'}">🏆 대륙 순위 #${r.rankBefore} → #${r.rankAfter}${r.rankAfter>r.rankBefore?" (추월당함!)":" ↑"}</div>`;
  h+=`<div class="res-line k">국력 ${r.mightGain>=0?"+":""}${r.mightGain}</div>`;
  showModal(`<h2>🌙 자리를 비운 사이…</h2>${h}<button class="minibtn" id="modalClose">확인</button>`);
}

/* ===== 턴 / 실시간 루프 (일시정지 가능) ===== */
// 한 틱 = endTurn + 렌더 + 저장 + 사건 처리. 수동 버튼과 실시간 루프가 공유(단일 소스).
function stepTurn(){
  if(state.over) return;
  const r=Game.endTurn(state);
  render(); saveLocal(true);   // 매 틱 자동 저장
  // 전투 알림: 유저 피드백 "적 공격이 정신없다" → 이긴 전투(자동사냥 킬·수성 승리)는 토스트만, 진 전투만 일시정지+모달.
  if(r.enemyBattle){ const b=r.enemyBattle;
    const pWon=(b.w==="A"&&b.aSide==="P")||(b.w==="B"&&b.aSide==="E");
    if(pWon||b.w==="draw"){ toast(`⚔ ${b.result.split('·').slice(0,2).join('·').trim()}`); }   // 승리·무승부 → 흐름 안 끊고 토스트
    else { rtPause(); showBattleModal(b); }   // 패배(부대 전멸/수도 위기)만 멈추고 모달로 확인
  }
  if(r.rankEvent){ const e=r.rankEvent; const rw=e.reward?Object.entries(e.reward).filter(([k,v])=>v).map(([k,v])=>`${k}+${v}`).join(" "):"";   // I3: 경쟁 시즌 마감 — 배너로만(재생 안 끊음)
    showThreatBanner(`🏆 경쟁 시즌 ${e.num} 종료 — <b>${e.tier.name}</b> 달성! (최고 순위 #${e.bestRank}) 보상 ${rw} · 새 시즌 시작`, "warn"); }
  if(r.worldEvent){ const ev=r.worldEvent;   // 정복/함락/레이드(A3) — 진행 이벤트. 유저 요청: 팝업이 재생을 끊는 게 불편 → 정지·모달 없이 배너/토스트로만 안내(게임은 계속).
    const rw=ev.reward?Object.entries(ev.reward).map(([k,v])=>`${k} +${v}`).join(", "):"";
    if(ev.type==="conquest") toast(`🏰 정복! 적 수도 함락${rw?` — ${rw}`:""}`);
    else if(ev.type==="raid"){ if(ev.winner==="P") toast(`🏛 레이드 성공!${rw?` — ${rw}`:""}`); else showThreatBanner("🏛 레이드 실패 — 고대성을 놓쳤습니다. 재도전 가능", "warn"); }
    else if(ev.type==="defeat") showThreatBanner("💥 수도 함락 — 자원 절반 손실·성벽 손상. 주둔군을 재건하세요", "danger");
  }
  else if(r.seasonEvent) showThreatBanner(r.seasonEvent.type==="warning"
    ? `⚠ ${r.seasonEvent.arriveIn}턴 후 시즌 대침공(${r.seasonEvent.count}차) 예고!${r.seasonEvent.previewUnit?` 예상 주력: ${r.seasonEvent.previewUnit}`:""}`
    : `⚔ 시즌 대침공 ${r.seasonEvent.count}차 도착! 병력 ${r.seasonEvent.troops}`, r.seasonEvent.type==="warning"?"warn":"danger");
  else if(r.factionEvents&&r.factionEvents.length) showThreatBanner(`⚔ ${r.factionEvents.map(e=>`${e.faction} 습격대 등장(병력 ${e.troops})${e.target&&e.target!=="P"?` — ${NODES[e.target]?.name||e.target} 노림!`:""}`).join(" · ")}`, "danger");
  else if(r.dragonCompleted&&r.dragonCompleted.length) toast(`🐉 드래곤 성장: ${r.dragonCompleted[r.dragonCompleted.length-1].name}!`);
  else if(r.msCompleted&&r.msCompleted.length) toast(`🏅 마일스톤 달성: ${r.msCompleted[r.msCompleted.length-1].name}!`);
  else if(r.questsCompleted&&r.questsCompleted.length) toast(`🎯 목표 달성: ${r.questsCompleted[r.questsCompleted.length-1].name}!`);
  else if(r.built) toast(`🏗 ${r.built} 완성!`);
  else if(!r.enemyBattle) toast("⏱ 시간 경과 — 수입·생산 정산");
}
// 실시간 상태(UI 전용, 저장 안 함). 기본 일시정지 — 플레이어가 첫 수를 두고 ▶ 재생.
let rtPaused=true, rtSpeed=1, rtTimer=null;
// 유저 피드백: "몇 분 안 됐는데 턴이 몇백 쌓여 T5·수천 자원·수백 병력까지 순식간" — 건설/연구/생산 durations은 전부
// "턴 수"로 정의돼 있는데(예: 건물 3턴), 그 턴이 실시간 2.5초마다 자동으로 흐르니 몇 분이면 수백 턴이 지나가 버림.
// game.js의 개별 상수(TRAIN_TICKS·buildDur·RESEARCH turns 등)를 전부 손대는 대신, 틱 간격 하나만 4배 늦춰
// 건설·연구·생산·수입·AI 위협까지 전부 같은 비율로 느려지게(단일 레버). sim.js는 턴 수 기반이라 이 상수와 무관 — 영향 없음.
const RT_BASE=10000;   // 1x 틱 간격(ms, 기존 2500→10000). 배속 2x=5s·4x=2.5s(구 1x와 동일한 체감).
// 유저 피드백: "10초 동안 게임이 멈춘 것처럼 보인다" — RT_BASE를 4배 늦추니(위) 한 틱 사이에 화면이 전혀
// 안 바뀌는 구간이 길어져 정지처럼 느껴짐. 게임 로직은 그대로 두고, 다음 틱까지 남은 시간을 CSS transition으로
// 채워지는 얇은 진행바로 보여줘 "멈춘 게 아니라 흘러가고 있다"를 시각적으로 알려준다.
// CSS transition(강제 리플로우) 방식은 백그라운드/비포커스 탭에서 컴포지터가 늦게 반영해 안 움직이는 경우가 있어,
// 대신 경과 시간을 직접 계산해 매 프레임 폭을 갱신(requestAnimationFrame) — 더 견고함.
let tickBarSince=0, tickBarRAF=null;
// 유저 피드백(2차): "진행바 말고 화면 전체가 조금씩 움직여야" — 같은 rAF 루프에서 지도도 매 프레임 다시 그려
// 부대 토큰이 틱 사이에도 실제 시간만큼 미리 부드럽게 전진해 보이게(renderMap의 보간식이 tickBarSince를 읽음).
// 패널/자원바는 비용이 커서 매 프레임 안 건드리고 실제 틱(stepTurn)에만 갱신.
function tickBarLoop(){ const f=document.getElementById('tickBarFill');
  if(!f||rtPaused){ tickBarRAF=null; return; }
  const pct=Math.min(100,(Date.now()-tickBarSince)/(RT_BASE/rtSpeed)*100);
  f.style.width=pct+"%";
  if(typeof renderMap==="function") renderMap();
  tickBarRAF=requestAnimationFrame(tickBarLoop); }
function tickBarReset(){ const f=document.getElementById('tickBarFill'); if(f)f.style.width="0%"; if(tickBarRAF){cancelAnimationFrame(tickBarRAF);tickBarRAF=null;} }
function tickBarStart(){ tickBarSince=Date.now(); if(!tickBarRAF) tickBarRAF=requestAnimationFrame(tickBarLoop); }
function rtStop(){ rtPaused=true; if(rtTimer){clearInterval(rtTimer);rtTimer=null;} tickBarReset(); rtSync(); }
function rtPause(){ rtStop(); }
function rtPlay(){ if(state.over)return; rtPaused=false; if(rtTimer)clearInterval(rtTimer);
  tickBarStart();
  rtTimer=setInterval(()=>{ if(!rtPaused&&!state.over){ stepTurn(); tickBarStart(); } }, RT_BASE/rtSpeed); rtSync(); }
function rtToggle(){ rtPaused?rtPlay():rtPause(); }
function rtSetSpeed(s){ rtSpeed=s; if(!rtPaused)rtPlay(); rtSync(); }   // 재생 중이면 재시작으로 간격 반영
function rtSync(){ const pb=document.getElementById('rtPlay'); if(!pb)return;
  pb.textContent=rtPaused?"▶ 재생":"⏸ 일시정지";
  pb.style.background=rtPaused?"":"var(--green)"; pb.style.color=rtPaused?"":"#04240f";
  const tb=document.getElementById('tickBar'); if(tb) tb.style.opacity=rtPaused?"0.25":"1";
  document.querySelectorAll('.rtspeed').forEach(b=>{const on=+b.dataset.spd===rtSpeed;
    b.style.background=on?'var(--gold)':''; b.style.color=on?'#04240f':''; b.style.borderColor=on?'var(--gold)':'';});
}
// 컨트롤 주입 (템플릿 무수정): #endturn 앞에 ▶재생/배속 삽입, #endturn 은 "수동 한 틱".
(function(){ const et=document.getElementById('endturn'); if(!et)return;
  et.textContent="⏭ 한 틱"; et.title="수동으로 한 틱 진행(일시정지 중 유용)";
  const w=document.createElement('span'); w.style.cssText="display:flex;gap:3px;align-items:center";
  w.innerHTML=`<button id="rtPlay" title="시간 재생/일시정지">▶ 재생</button>`
    +[1,2,4].map(s=>`<button class="rtspeed minibtn" data-spd="${s}" title="배속 ${s}x">${s}x</button>`).join("")
    +`<span id="tickBar" title="다음 턴까지" style="display:inline-block;width:34px;height:6px;background:var(--line);border-radius:3px;overflow:hidden;opacity:.25"><span id="tickBarFill" style="display:block;height:100%;width:0%;background:var(--green)"></span></span>`;
  et.parentNode.insertBefore(w, et);
  document.getElementById('rtPlay').onclick=rtToggle;
  w.querySelectorAll('[data-spd]').forEach(b=>b.onclick=()=>rtSetSpeed(+b.dataset.spd));
})();
document.getElementById('endturn').onclick=stepTurn;
document.getElementById('castleBtn').onclick=()=>{state.pendingMove=null;state.selected={kind:"node",id:"P"};render();};
svg.addEventListener('click',()=>{state.selected=null;state.pendingMove=null;state.mode="normal";closeSheet();render();});
// ---- 바텀시트(모바일) — 부대/성 선택 시 자동으로 펼침, 지도 배경 탭·손잡이 탭으로 접음. 데스크톱은 CSS가 무시(항상 펼침 레이아웃).
function openSheet(){ document.getElementById('panel')?.classList.add('sheetOpen'); }
function closeSheet(){ document.getElementById('panel')?.classList.remove('sheetOpen'); }
const isSheetOpen=()=>!!document.getElementById('panel')?.classList.contains('sheetOpen');
(function(){   // 퀵바 4칸(목표/내정/부대출전/선택) — 이미 그 화면이 열려 있으면 탭해서 닫고, 아니면 그 컨텍스트로 열기.
  const qq=document.getElementById('qcQuest'), qc=document.getElementById('qcCastle'), qd=document.getElementById('qcDeploy'), qs=document.getElementById('qcSel');
  if(!qq) return;   // 구버전 템플릿 방어
  qq.onclick=()=>{ if(!state.selected && isSheetOpen()) closeSheet();
    else { state.selected=null; state.infoOpen=true; openSheet(); } render(); };
  qc.onclick=()=>{ const active=state.selected?.kind==="node"&&state.selected.id==="P"&&state.castleTab!=="출전";
    if(active && isSheetOpen()) closeSheet();
    else { state.pendingMove=null; state.selected={kind:"node",id:"P"}; if(state.castleTab==="출전")state.castleTab="건물"; openSheet(); } render(); };
  if(qd) qd.onclick=()=>{ const active=state.selected?.kind==="node"&&state.selected.id==="P"&&state.castleTab==="출전";   // 유저 요청: '⚔부대출전' 고정 칸 — 항상 성 출전 화면으로 직행
    if(active && isSheetOpen()) closeSheet();
    else { state.pendingMove=null; state.selected={kind:"node",id:"P"}; state.castleTab="출전"; openSheet(); } render(); };
  qs.onclick=()=>{ isSheetOpen()?closeSheet():openSheet(); render(); };   // 현재 선택 대상은 바꾸지 않고 열기/닫기만
})();
// ---- 지도 드래그 팬(모바일) — .mapbox가 svg보다 작을 때만 의미 있음(데스크톱은 콘텐츠가 꽉 차 사실상 무동작).
let resetMapPan=()=>{};
(function(){ const box=svg.parentElement; if(!box) return;
  let pan={x:0,y:0}, drag=null;
  const apply=()=>{svg.style.transform=`translate(${pan.x}px,${pan.y}px)`;};
  const clamp=()=>{ const bw=box.clientWidth,bh=box.clientHeight, r=svg.getBoundingClientRect(), sw=r.width||bw, sh=r.height||bh;
    const minX=Math.min(0,bw-sw), minY=Math.min(0,bh-sh);
    pan.x=Math.max(minX,Math.min(0,pan.x)); pan.y=Math.max(minY,Math.min(0,pan.y)); };
  resetMapPan=()=>{ pan={x:0,y:0}; apply(); };
  const startDrag=(id,x,y,pid)=>{ drag={id,x,y,ox:pan.x,oy:pan.y,moved:false,pid}; };
  // 실제로 임계 이상 움직였을 때만 setPointerCapture — 즉시 잡으면 순수 탭(드래그 없음)의 click이
  // 항상 box로 리다이렉트되어 타일/부대 클릭이 전부 씹히는 버그가 됐었음(포인터 캡처 사양상 부작용).
  const moveDrag=(id,x,y)=>{ if(!drag||drag.id!==id) return;
    const dx=x-drag.x, dy=y-drag.y;
    if(!drag.moved && (Math.abs(dx)>4||Math.abs(dy)>4)){ drag.moved=true;
      if(drag.pid!=null){ try{box.setPointerCapture(drag.pid);}catch(err){} } }
    if(drag.moved){ pan.x=drag.ox+dx; pan.y=drag.oy+dy; clamp(); apply(); } };
  const endDrag=id=>{ if(drag&&drag.id===id&&drag.moved){ const swallow=ev=>{ev.stopPropagation();ev.preventDefault();box.removeEventListener('click',swallow,true);};
    box.addEventListener('click',swallow,true); } if(!drag||drag.id===id) drag=null; };
  // 포인터 이벤트(실제 터치·마우스 — 대부분의 브라우저가 여기로 통합) + 레거시 마우스 이벤트(구형/일부 자동화 환경 폴백).
  box.addEventListener('pointerdown',e=>{ startDrag('p',e.clientX,e.clientY,e.pointerId); });
  box.addEventListener('pointermove',e=>moveDrag('p',e.clientX,e.clientY));
  box.addEventListener('pointerup',()=>endDrag('p')); box.addEventListener('pointercancel',()=>endDrag('p'));
  box.addEventListener('mousedown',e=>{ if(!drag) startDrag('m',e.clientX,e.clientY); });
  window.addEventListener('mousemove',e=>{ if(drag&&drag.id==='m') moveDrag('m',e.clientX,e.clientY); });
  window.addEventListener('mouseup',()=>{ if(drag&&drag.id==='m') endDrag('m'); });
})();
render(); rtSync();
try{ if(localStorage.getItem(SAVE_KEY)) toast("이전 저장 있음 — 📂 눌러 이어하기 · ▶ 재생으로 시간 시작"); }catch(e){}

</script>
