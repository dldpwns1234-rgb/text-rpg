<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>판타지 미니 4X — Phase A 전투 프로토타입</title>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#273449; --line:#334155;
    --txt:#e2e8f0; --dim:#94a3b8; --blue:#3b82f6; --red:#ef4444;
    --green:#22c55e; --amber:#f59e0b;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,"Malgun Gothic","맑은 고딕",system-ui,sans-serif;
    padding:16px;line-height:1.4;}
  h1{font-size:20px;margin:0 0 2px;}
  .sub{color:var(--dim);font-size:13px;margin-bottom:14px;}
  .controls{display:flex;flex-wrap:wrap;gap:16px;align-items:center;
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:12px 16px;margin-bottom:14px;}
  .controls label{font-size:13px;color:var(--dim);display:flex;align-items:center;gap:8px;}
  .controls input[type=range]{width:120px;}
  .val{color:var(--txt);font-weight:600;min-width:34px;display:inline-block;text-align:right;}
  .arena{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:820px){.arena{grid-template-columns:1fr;}}
  .side{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;}
  .side.A{border-top:3px solid var(--blue);}
  .side.B{border-top:3px solid var(--red);}
  .side h2{font-size:15px;margin:0 0 4px;display:flex;justify-content:space-between;align-items:center;}
  .tagA{color:var(--blue);} .tagB{color:var(--red);}
  .slots{font-size:12px;color:var(--dim);}
  .slots b{color:var(--txt);}
  .presets{margin:6px 0 10px;display:flex;gap:6px;flex-wrap:wrap;}
  .presets button, .hero-btn{background:var(--card2);color:var(--txt);border:1px solid var(--line);
    border-radius:7px;padding:4px 9px;font-size:12px;cursor:pointer;}
  .presets button:hover,.hero-btn:hover{background:var(--line);}
  .hero-btn.on{background:var(--amber);color:#1a1200;border-color:var(--amber);font-weight:600;}
  .urow{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--card2);}
  .uname{flex:1;font-size:13px;}
  .uname small{color:var(--dim);font-size:11px;}
  .stepper{display:flex;align-items:center;gap:4px;}
  .stepper button{width:24px;height:24px;border-radius:6px;border:1px solid var(--line);
    background:var(--card2);color:var(--txt);font-size:15px;cursor:pointer;line-height:1;}
  .stepper input{width:38px;text-align:center;background:var(--bg);color:var(--txt);
    border:1px solid var(--line);border-radius:6px;padding:3px;font-size:13px;}
  .tier{background:var(--bg);color:var(--txt);border:1px solid var(--line);border-radius:6px;
    padding:3px 4px;font-size:12px;}
  .go{display:flex;gap:10px;justify-content:center;margin:16px 0;}
  .go button{font-size:15px;font-weight:700;padding:10px 22px;border-radius:10px;border:none;cursor:pointer;}
  #fight{background:var(--green);color:#04240f;}
  #stats{background:var(--card2);color:var(--txt);border:1px solid var(--line);}
  .go button:disabled{opacity:.5;cursor:default;}
  .battlefield{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:12px;}
  .bf{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;min-height:120px;}
  .bf.A{border-left:3px solid var(--blue);} .bf.B{border-left:3px solid var(--red);}
  .rowlabel{font-size:11px;color:var(--dim);margin:6px 0 2px;text-transform:uppercase;letter-spacing:.5px;}
  .stack{display:flex;align-items:center;gap:8px;margin:3px 0;font-size:12px;}
  .stack .n{width:78px;flex:none;}
  .bar{flex:1;height:14px;background:var(--bg);border-radius:7px;overflow:hidden;border:1px solid var(--line);}
  .fill{height:100%;transition:width .35s ease;}
  .A .fill{background:linear-gradient(90deg,#1d4ed8,#60a5fa);}
  .B .fill{background:linear-gradient(90deg,#b91c1c,#f87171);}
  .cnt{width:52px;text-align:right;color:var(--dim);flex:none;font-variant-numeric:tabular-nums;}
  .status{text-align:center;font-size:14px;margin:10px 0;min-height:22px;font-weight:600;}
  .log{background:#0b1220;border:1px solid var(--line);border-radius:10px;padding:10px 12px;
    font-size:12px;color:var(--dim);height:120px;overflow:auto;margin-top:12px;
    font-family:ui-monospace,Menlo,Consolas,monospace;}
  .log div{padding:1px 0;}
  .banner{text-align:center;font-size:18px;font-weight:800;padding:12px;border-radius:10px;margin-top:10px;}
  .banner.A{background:rgba(59,130,246,.15);color:#93c5fd;border:1px solid var(--blue);}
  .banner.B{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid var(--red);}
  .banner.draw{background:rgba(148,163,184,.15);color:var(--dim);border:1px solid var(--line);}
  .hint{color:var(--dim);font-size:12px;text-align:center;margin-top:8px;}
</style>
</head>
<body>
<h1>⚔️ 판타지 미니 4X — Phase A 전투 프로토타입</h1>
<div class="sub">양쪽 군대를 편성하고 전투를 관전하세요. 검증된 전투 규칙(병과 상성·특수·티어·슬롯 상한·라운드 캡 + 전열 피해 분산)을 그대로 구현했습니다.</div>

<div class="controls">
  <label>슬롯 상한(부대당) <input type="range" id="slotCap" min="8" max="40" value="24"><span class="val" id="slotCapV">24</span></label>
  <label>라운드 캡 <input type="range" id="roundCap" min="4" max="40" value="12"><span class="val" id="roundCapV">12</span></label>
  <label>관전 속도 <input type="range" id="speed" min="1" max="10" value="6"><span class="val" id="speedV">6</span></label>
</div>

<div class="arena">
  <div class="side A" id="sideA"></div>
  <div class="side B" id="sideB"></div>
</div>

<div class="go">
  <button id="fight">⚔️ 전투 시작</button>
  <button id="stats">📊 100회 통계</button>
</div>

<div class="status" id="status"></div>
<div class="battlefield">
  <div class="bf A" id="bfA"></div>
  <div class="bf B" id="bfB"></div>
</div>
<div class="log" id="log"></div>
<div class="hint">TIP: 프리셋으로 병과 상성(보병▶기병▶궁병▶보병)을 빠르게 시험해 보세요. 창병은 기병을 요격하고, 경기병은 후방 궁병을 노립니다.</div>

<script>
//__ENGINE__

/* ===== UI 상태 ===== */
const state={
  A:{hero:false,units:{}}, B:{hero:false,units:{}}
};
NAMES.forEach(n=>{state.A.units[n]={count:0,tier:1};state.B.units[n]={count:0,tier:1};});

const PRESETS={
  "보병군":{중갑보병:8,창병:10,장궁병:4},
  "기병군":{중갑보병:4,경기병:12,중기병:6},
  "궁병군":{중갑보병:8,장궁병:8,석궁병:6},
  "혼성군":{중갑보병:6,창병:4,경기병:4,장궁병:4,석궁병:2},
  "비우기":{}
};

function slotCap(){return +document.getElementById('slotCap').value;}
function usedSlots(side){return NAMES.reduce((x,n)=>x+state[side].units[n].count,0);}

function buildSide(side){
  const el=document.getElementById('side'+side);
  const tag=side==='A'?'아군':'적군';
  el.innerHTML=`<h2><span class="tag${side}">${side==='A'?'🔵':'🔴'} ${tag}</span>
    <span class="slots">슬롯 <b id="used${side}">0</b>/<b id="cap${side}">${slotCap()}</b></span></h2>
    <div class="presets" id="pre${side}"></div>
    <div id="rows${side}"></div>`;
  const pre=document.getElementById('pre'+side);
  Object.keys(PRESETS).forEach(p=>{
    const b=document.createElement('button');b.textContent=p;
    b.onclick=()=>applyPreset(side,p);pre.appendChild(b);
  });
  const hb=document.createElement('button');hb.className='hero-btn';hb.id='hero'+side;
  hb.textContent='🦸 전투영웅 OFF';
  hb.onclick=()=>{state[side].hero=!state[side].hero;
    hb.classList.toggle('on',state[side].hero);
    hb.textContent=state[side].hero?'🦸 전투영웅 ON (+20%)':'🦸 전투영웅 OFF';};
  pre.appendChild(hb);
  const rows=document.getElementById('rows'+side);
  NAMES.forEach(n=>{
    const u=UNITS[n];
    const d=document.createElement('div');d.className='urow';
    d.innerHTML=`<div class="uname">${n} <small>${u.desc}</small></div>
      <select class="tier" id="tier${side}${n}">${[1,2,3,4,5].map(t=>`<option value="${t}">T${t}</option>`).join('')}</select>
      <div class="stepper">
        <button data-d="-1">−</button>
        <input type="number" id="cnt${side}${n}" value="0" min="0">
        <button data-d="1">+</button>
      </div>`;
    rows.appendChild(d);
    const inp=d.querySelector('input');
    const setC=v=>{v=Math.max(0,v|0);
      const others=usedSlots(side)-state[side].units[n].count;
      if(others+v>slotCap()) v=Math.max(0,slotCap()-others);
      state[side].units[n].count=v;inp.value=v;refreshSlots(side);};
    d.querySelectorAll('.stepper button').forEach(b=>b.onclick=()=>setC(state[side].units[n].count+ (+b.dataset.d)));
    inp.onchange=()=>setC(+inp.value);
    d.querySelector('select').onchange=e=>state[side].units[n].tier=+e.target.value;
  });
  refreshSlots(side);
}
function refreshSlots(side){
  document.getElementById('used'+side).textContent=usedSlots(side);
  document.getElementById('cap'+side).textContent=slotCap();
}
function applyPreset(side,p){
  const cfg=PRESETS[p];
  NAMES.forEach(n=>{state[side].units[n].count=cfg[n]||0;
    document.getElementById('cnt'+side+n).value=cfg[n]||0;});
  // 슬롯 초과 방지
  let u=usedSlots(side);
  if(u>slotCap()){NAMES.slice().reverse().forEach(n=>{
    while(usedSlots(side)>slotCap()&&state[side].units[n].count>0){state[side].units[n].count--;}
    document.getElementById('cnt'+side+n).value=state[side].units[n].count;});}
  refreshSlots(side);
}
function compOf(side){return NAMES.map(n=>({name:n,count:state[side].units[n].count,tier:state[side].units[n].tier}));}

/* ===== 렌더 ===== */
function renderFrame(fr){
  ['A','B'].forEach(side=>{
    const bf=document.getElementById('bf'+side);
    let html='';
    ROWS.forEach(row=>{
      const items=fr[side].filter(s=>s.row===row);
      if(!items.length)return;
      html+=`<div class="rowlabel">${ROWKO[row]}</div>`;
      items.forEach(s=>{
        const pct=s.init?Math.round(100*s.alive/s.init):0;
        html+=`<div class="stack"><span class="n">${s.name}${s.tier>1?' T'+s.tier:''}</span>
          <span class="bar"><span class="fill" style="width:${pct}%"></span></span>
          <span class="cnt">${s.alive}/${s.init}</span></div>`;
      });
    });
    bf.innerHTML=html||'<div class="rowlabel">전멸</div>';
  });
}
function log(msg,cls){const l=document.getElementById('log');
  const d=document.createElement('div');d.textContent=msg;if(cls)d.style.color=cls;l.appendChild(d);l.scrollTop=l.scrollHeight;}

let playing=false;
function fight(){
  if(playing)return;
  const cA=compOf('A'),cB=compOf('B');
  if(usedSlots('A')===0||usedSlots('B')===0){document.getElementById('status').textContent='양쪽 모두 병력을 편성하세요.';return;}
  const res=simulate(cA,state.A.hero,cB,state.B.hero,+document.getElementById('roundCap').value);
  document.getElementById('log').innerHTML='';
  document.getElementById('status').textContent='⚔️ 전투 중...';
  playing=true;document.getElementById('fight').disabled=true;document.getElementById('stats').disabled=true;
  const spd=+document.getElementById('speed').value;
  const interval=Math.max(120,900-spd*80);
  let i=0;
  const step=()=>{
    const fr=res.frames[i];renderFrame(fr);if(fr.log)log(fr.log);
    i++;
    if(i<res.frames.length){setTimeout(step,interval);}
    else{
      const banner=document.createElement('div');
      banner.className='banner '+res.w;
      banner.textContent = res.w==='draw'?`무승부 (${res.rounds}R 소진)`
        :(res.w==='A'?`🔵 아군 승리!`:`🔴 적군 승리!`)+`  (${res.rounds}R, 생존 아군 ${res.survA} · 적 ${res.survB})`;
      const old=document.querySelector('.banner');if(old)old.remove();
      document.querySelector('.battlefield').after(banner);
      document.getElementById('status').textContent='';
      playing=false;document.getElementById('fight').disabled=false;document.getElementById('stats').disabled=false;
    }
  };
  const old=document.querySelector('.banner');if(old)old.remove();
  step();
}
function stats(){
  const cA=compOf('A'),cB=compOf('B');
  if(usedSlots('A')===0||usedSlots('B')===0){document.getElementById('status').textContent='양쪽 모두 병력을 편성하세요.';return;}
  const mr=+document.getElementById('roundCap').value;
  let w={A:0,B:0,draw:0};
  for(let i=0;i<100;i++){w[simulate(cA,state.A.hero,cB,state.B.hero,mr).w]++;}
  document.getElementById('status').innerHTML=
    `📊 100회 결과 — <span class="tagA">아군 ${w.A}승</span> · <span class="tagB">적군 ${w.B}승</span> · 무 ${w.draw}`;
}

/* ===== 초기화 ===== */
['slotCap','roundCap','speed'].forEach(id=>{
  const el=document.getElementById(id);
  el.oninput=()=>{document.getElementById(id+'V').textContent=el.value;if(id==='slotCap'){refreshSlots('A');refreshSlots('B');}};
});
buildSide('A');buildSide('B');
applyPreset('A','보병군');applyPreset('B','기병군');
document.getElementById('fight').onclick=fight;
document.getElementById('stats').onclick=stats;
renderFrame({A:compOf('A').filter(u=>u.count).map(u=>({name:u.name,row:UNITS[u.name].row,tier:u.tier,alive:u.count,init:u.count})),
             B:compOf('B').filter(u=>u.count).map(u=>({name:u.name,row:UNITS[u.name].row,tier:u.tier,alive:u.count,init:u.count}))});
</script>
</body>
</html>
