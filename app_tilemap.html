<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>판타지 미니 4X — Phase B 조각②: 채집 + 성 내정</title>
<style>
  :root{--bg:#0f172a;--card:#1e293b;--card2:#273449;--line:#334155;--txt:#e2e8f0;--dim:#94a3b8;
    --blue:#3b82f6;--red:#ef4444;--gold:#f59e0b;--green:#22c55e;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,"Malgun Gothic",system-ui,sans-serif;padding:12px;line-height:1.4;font-size:14px;}
  h1{font-size:18px;margin:0 0 8px;}
  .top{position:relative;display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:var(--card);
    border:1px solid var(--line);border-radius:10px;padding:8px 12px;margin-bottom:10px;}
  .resbar{display:flex;gap:6px;flex-wrap:wrap;}
  .res{display:flex;gap:6px;align-items:center;background:var(--bg);border:1px solid var(--line);
    border-radius:8px;padding:4px 9px;font-variant-numeric:tabular-nums;flex-shrink:0;}
  .res .inc{color:var(--green);font-size:12px;}
  button{background:var(--card2);color:var(--txt);border:1px solid var(--line);border-radius:8px;
    padding:6px 12px;font-size:13px;cursor:pointer;font-weight:600;}
  button:hover:not(:disabled){background:var(--line);}
  button:disabled{opacity:.4;cursor:default;}
  #endturn{background:var(--green);color:#04240f;border:none;}
  #menuBtn{display:none;}                    /* 데스크톱: ☰ 안 씀, 아래 5버튼 항상 인라인 */
  .menu-drop{display:flex;gap:8px;}
  .wrap{display:grid;grid-template-columns:1fr 300px;gap:10px;}
  .mapbox{background:#0b1220;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  svg{display:block;width:100%;height:auto;}
  button,.minibtn{touch-action:manipulation;-webkit-tap-highlight-color:rgba(245,158,11,.25);}  /* 탭 300ms 지연 제거 */
  .sheet-handle{display:none;}                /* 데스크톱: 바텀시트 손잡이 숨김(패널이 항상 옆에 펼쳐져 있음) */
  @media(max-width:820px){          /* 모바일: 지도는 드래그 팬 + 고정 높이, 패널은 바텀시트 */
    .wrap{grid-template-columns:1fr;}
    .mapbox{height:52vh;overflow:hidden;touch-action:none;}   /* 네이티브 스크롤 대신 JS 드래그 팬 */
    svg{width:672px;max-width:none;transform-origin:0 0;}     /* 타일 ~47px, 팬으로 좌우 이동 */
    .minibtn{font-size:13px;padding:8px 11px;}
    button{min-height:42px;}
    .prodrow{padding:7px 0;}
    select,input[type=number]{min-height:38px;font-size:14px;padding:5px;}
    .top{padding:6px 8px;gap:5px 6px;}
    .resbar{flex:1 1 100%;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;
      scrollbar-width:none;-ms-overflow-style:none;padding-bottom:2px;}   /* 자원칸 한 줄 가로 스크롤(3줄→1줄, 유저 피드백: 상단이 자리를 너무 차지) */
    .resbar::-webkit-scrollbar{display:none;}
    .res{padding:4px 7px;font-size:12px;}
    #menuBtn{display:inline-block;}
    .menu-drop{position:absolute;top:100%;right:12px;margin-top:4px;background:var(--card);
      border:1px solid var(--line);border-radius:10px;padding:8px;flex-direction:column;z-index:16;
      box-shadow:0 6px 16px rgba(0,0,0,.4);}
    .menu-drop.hidden{display:none;}
    .sheet-handle{display:flex;margin:-12px -12px 8px;border-bottom:1px solid var(--line);
      position:sticky;top:0;background:var(--card);z-index:2;}   /* 유저 피드백: 내정 내용 스크롤 시 손잡이가 같이 밀려 올라가 빠져나갈 방법이 사라짐 → 상단 고정 */
    .qc{flex:1;min-width:0;text-align:center;font-size:11px;color:var(--dim);padding:9px 4px;
      cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-right:1px solid var(--line);}
    .qc:last-child{border-right:none;}
    .qc:active{background:var(--card2);}   /* 유저 피드백: 손잡이 대신 목표·내정·선택 3칸 퀵바 — 탭하면 바로 그 화면으로 */
    .panel{position:fixed;left:0;right:0;bottom:0;max-height:18vh;overflow-y:auto;
      border-radius:14px 14px 0 0;box-shadow:0 -8px 24px rgba(0,0,0,.45);z-index:15;
      transition:max-height .25s ease;}
    .panel.sheetOpen{max-height:78vh;}
  }
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;font-size:13px;}
  .panel h3{margin:0 0 8px;font-size:14px;display:flex;justify-content:space-between;}
  .k{color:var(--dim);}
  .edge{stroke:#334155;stroke-width:3;}
  .reach{stroke:var(--green);stroke-width:3;stroke-dasharray:5 4;fill:none;opacity:.9;}
  .nlabel{fill:var(--dim);font-size:11px;text-anchor:middle;pointer-events:none;}
  .gath{fill:var(--green);font-size:11px;text-anchor:middle;font-weight:700;pointer-events:none;}
  .army{cursor:pointer;} .node-hit{cursor:pointer;}
  .sel-ring{fill:none;stroke:var(--gold);stroke-width:3;stroke-dasharray:4 3;}
  .prodrow{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--card2);}
  .prodrow .nm{flex:1;} .prodrow .cost{font-size:11px;color:var(--dim);}
  .compgrid{display:grid;gap:2px;margin:4px 0;align-items:stretch;}   /* 출전 편성 그리드(열=병종,행=티어) — 유저 피드백: 세로 리스트가 너무 길다 */
  .compgrid .gh{font-size:9px;color:var(--dim);text-align:center;padding:2px 0;white-space:nowrap;overflow:hidden;}
  .compgrid .gcell{display:flex;flex-direction:column;align-items:stretch;background:var(--bg);border-radius:4px;overflow:hidden;}
  .compgrid .gcell.empty{align-items:center;justify-content:center;color:var(--dim);font-size:10px;background:none;}
  .compgrid .gbtn{font-size:10px;padding:2px 0;line-height:1.4;border-radius:0;min-height:0;}
  .compgrid .gn{text-align:center;font-size:10px;padding:1px 0;background:var(--card2);}
  .hero{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:7px;margin:6px 0;}
  .hero .loc{font-size:11px;color:var(--gold);}
  .minibtn{font-size:11px;padding:3px 7px;}
  .toast{position:fixed;left:50%;top:14px;transform:translateX(-50%);background:#111827;
    border:1px solid var(--line);padding:8px 15px;border-radius:8px;font-size:13px;opacity:0;
    transition:opacity .25s;pointer-events:none;z-index:9;}
  .toast.show{opacity:1;}
  .queue{font-size:12px;color:var(--dim);margin-top:4px;}
  hr{border:none;border-top:1px solid var(--line);margin:10px 0;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:20;}
  .modal-overlay.hidden{display:none;}
  .modal{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 24px;max-width:340px;text-align:center;}
  .modal h2{margin:0 0 10px;font-size:20px;}
  .modal .res-line{margin:7px 0;font-size:14px;}
  .modal button{margin-top:14px;padding:6px 18px;}
</style>
</head>
<body>
<h1>🏰 Phase C — 타일 그리드 (14×9, game.js 재사용)</h1>
<div class="top">
  <span class="k">턴 <b id="turn" style="color:var(--gold)">1</b></span>
  <span id="resbar" class="resbar"></span>
  <span id="moveConfirm"></span>
  <span style="flex:1"></span>
  <div id="menuDrop" class="menu-drop hidden">
    <button id="saveBtn" title="현재 판 저장(브라우저)">💾</button>
    <button id="loadBtn" title="저장된 판 불러오기">📂</button>
    <button id="exportBtn" title="세이브 파일로 내보내기">⬇</button>
    <button id="importBtn" title="세이브 파일 가져오기">⬆</button>
    <input type="file" id="importFile" accept=".json,application/json" style="display:none">
    <button id="newBtn" title="새 게임">🆕</button>
  </div>
  <button id="menuBtn" title="메뉴(저장·불러오기 등)">☰</button>
  <button id="castleBtn">🏰 성 내정</button>
  <button id="endturn">⏭ 턴 종료</button>
</div>
<div class="wrap">
  <div class="mapbox"><svg id="map" viewBox="0 0 776 506" preserveAspectRatio="xMidYMid meet"></svg></div>
  <div id="panel" class="panel">
    <div class="sheet-handle" id="sheetHandle">
      <div class="qc" id="qcQuest"></div>
      <div class="qc" id="qcCastle"></div>
      <div class="qc" id="qcDeploy"></div>
      <div class="qc" id="qcSel"></div>
      <div class="qc" id="qcMap">🗺 지도</div>
    </div>
    <div id="panelBody"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div id="modal" class="modal-overlay hidden"><div class="modal" id="modalBody"></div></div>

<script>
//__ENGINE__
//__GAME__
/* ===== 타일 그리드 맵 생성 → game.js 에 주입 (로직 재사용) ===== */
const GW=14, GH=9, TS=54, PAD=10;
function buildTileMap(){
  const NODES={}, EDGES=[], COORD={}, grid=[];
  // 성(P/E)·고대성 + 양 진영 대칭 자원 클러스터(성 근처 4자원씩). 몬스터는 랜덤 스폰(고정 둥지 없음).
  const specials=[
    {x:1,y:4,id:"P",def:{name:"아군 성",type:"castle",owner:"P"}},
    {x:GW-2,y:4,id:"E",def:{name:"적 성",type:"castle",owner:"E"}},
    {x:Math.floor(GW/2),y:7,id:"ANCIENT",def:{name:"고대성",type:"ancient",owner:null}},
  ];
  // 성 기준 자원 오프셋(거울 대칭). E는 x를 반전.
  const resOff=[{dx:2,dy:-2,res:"식량",nm:"곡창"},{dx:2,dy:2,res:"목재",nm:"삼림"},{dx:3,dy:-1,res:"석재",nm:"채석장"},{dx:3,dy:1,res:"철",nm:"철광"}];
  resOff.forEach((o,i)=>{
    specials.push({x:1+o.dx,y:4+o.dy,id:"PR"+i,def:{name:o.nm,type:"resource",res:o.res}});
    specials.push({x:(GW-2)-o.dx,y:4+o.dy,id:"ER"+i,def:{name:"동부 "+o.nm,type:"resource",res:o.res}});
  });
  const at={}; for(const s of specials) at[s.x+","+s.y]=s;
  for(let y=0;y<GH;y++){grid[y]=[];for(let x=0;x<GW;x++){
    const s=at[x+","+y]; const id=s?s.id:("t"+x+"_"+y);
    NODES[id]=s?{...s.def}:{name:"",type:"plain"}; COORD[id]=[x,y]; grid[y][x]=id;
  }}
  for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){
    if(x<GW-1)EDGES.push([grid[y][x],grid[y][x+1],1]);
    if(y<GH-1)EDGES.push([grid[y][x],grid[y+1][x],1]);
  }
  const spawn={ count:5,
    raid:{name:"고대 생물",mtier:"레이드",comp:{오우거:6,오크:12,하피:8},reward:{철:70,석재:50,식량:50}},
    pool:[
      {name:"늑대 무리",mtier:"사냥",comp:{늑대:12},reward:{식량:25,목재:20}},
      {name:"도적 무리",mtier:"사냥",comp:{고블린:8,늑대:4},reward:{식량:20,철:12}},
      {name:"고블린 무리",mtier:"토벌",comp:{오크:6,하피:6,오우거:2},reward:{철:40,석재:30,식량:30}},
      {name:"오크 무리",mtier:"토벌",comp:{오크:10,오우거:3,하피:5},reward:{철:35,목재:30,석재:25}},
    ] };
  return {map:{NODES,EDGES,spawn}, COORD};
}
const TILE=buildTileMap();
Game.setMap(TILE.map);
const COORDS={}; for(const id in TILE.COORD){const[gx,gy]=TILE.COORD[id];COORDS[id]=[PAD+gx*TS+TS/2, PAD+gy*TS+TS/2];}
/* ===== game.js 바인딩 (단일 소스, 타일맵 주입 후) ===== */
const {NODES,EDGES,ADJ,RES,UNIT_COST,ECON_BUILDINGS,ECON_CAP,BUILDINGS,RESEARCH,GROUPS,STATNAME,ARMY_CAP,CASTLE_UP_COST,UNIV_COST,dijkstra,pathTo,troops,
  TIER_MAX,TIER_NAME,unitLabel,baseOf,tierOf,costOf,maxTierFor,heroEffect,UNIT_BLD}=Game;
const state=Game.newGame();
state.selected=null; state.pendingMove=null; state.mode="normal"; state.castleTab="건물"; state.prodTier={}; // UI 전용 필드
const A=id=>state.armies.find(a=>a.id===id);
const armiesAt=n=>state.armies.filter(a=>a.node===n);
const heroById=id=>state.heroes.find(h=>h.id===id);
const income=()=>Game.income(state);
const buildRate=()=>Game.buildRate(state);
const hasR=k=>Game.hasR(state,k);
const gatherOf=a=>Game.gatherOf(state,a);
const canAfford=c=>Game.canAfford(state,c);

/* ===== 렌더 ===== */
const svg=document.getElementById('map'), SVGNS="http://www.w3.org/2000/svg";
const el=(t,a)=>{const e=document.createElementNS(SVGNS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
const nodeColor=n=>n.type==="castle"?"#f59e0b":n.type==="resource"?"#22c55e":n.type==="den"?"#7f1d1d":n.type==="ancient"?"#6d28d9":"#475569";

const tileFill=n=>n.type==="castle"?"#3b2408":n.type==="resource"?"#0f2e1a":n.type==="den"?"#2a0e0e":n.type==="ancient"?"#241247":"#131a26";
function renderMap(){
  svg.innerHTML="";
  let reach={};
  if(state.selected?.kind==="army"){const a=A(state.selected.id);if(a?.side==="P")reach=dijkstra(a.node,99).dist;}
  const selNode=A(state.selected?.id)?.node;
  const onPath={}; if(state.pendingMove) for(const t of state.pendingMove.path) onPath[t]=1;
  // ---- 타일 ----
  for(const id in NODES){
    const n=NODES[id],[x,y]=COORDS[id],px=x-TS/2,py=y-TS/2;
    const reachable = reach[id]!==undefined && id!==selNode;
    let stroke="#0b1220", sw=1;
    if(onPath[id]){stroke="#f59e0b";sw=2.5;} else if(reachable){stroke="#fbbf24";sw=1.5;}
    svg.appendChild(el("rect",{x:px+1.5,y:py+1.5,width:TS-3,height:TS-3,rx:6,fill:tileFill(n),stroke,"stroke-width":sw,
      class:"node-hit","data-node":id,...(reachable?{"data-go":id}:{}),style:"cursor:pointer"}));
    if(n.type==="castle")svg.appendChild(el("rect",{x:px+3,y:py+3,width:TS-6,height:TS-6,rx:5,fill:"none",stroke:n.owner==="P"?"#3b82f6":"#ef4444","stroke-width":2.5,"pointer-events":"none"}));
    if(n.type==="ancient")svg.appendChild(el("rect",{x:px+3,y:py+3,width:TS-6,height:TS-6,rx:5,fill:"none",stroke:n.owner==="P"?"#3b82f6":n.owner==="E"?"#ef4444":"#c4b5fd","stroke-width":2.5,"stroke-dasharray":n.owner?"none":"4 3","pointer-events":"none"}));
    if(n.type!=="plain"){
      const ic=el("text",{x,y:y-2,"text-anchor":"middle","font-size":18,"pointer-events":"none"});
      ic.textContent=n.type==="castle"?"🏰":n.type==="ancient"?"🏛":n.type==="resource"?"◆":"☠"; svg.appendChild(ic);
      const lb=el("text",{x,y:y+16,"text-anchor":"middle","font-size":8.5,fill:"#94a3b8","pointer-events":"none"});
      lb.textContent=n.res?n.res:(n.name.length>5?n.name.slice(0,4):n.name); svg.appendChild(lb);
    }
    // 레이드 수성 진행
    if(n.type==="ancient" && state.raid.holder && state.raid.holdTurns>0){
      const rb=el("text",{x,y:py-2,"text-anchor":"middle","font-size":10,"font-weight":"800","pointer-events":"none",fill:state.raid.holder==="P"?"#93c5fd":"#fca5a5"});
      rb.textContent=`🛡${state.raid.holdTurns}/${state.raid.need}`; svg.appendChild(rb);
    }
    // 둥지 재생성 카운트다운
    if(n.type==="den" && !armiesAt(id).some(a=>a.side==="M")){
      const rs=(state.respawns||[]).find(r=>r.node===id);
      if(rs){const t=el("text",{x,y:py-2,"text-anchor":"middle","font-size":9,"pointer-events":"none",fill:"#c4b5fd"});t.textContent=`⏳${Math.max(0,rs.at-state.turn)}`;svg.appendChild(t);}
    }
    // 채집 표시
    const g=armiesAt(id).map(gatherOf).filter(Boolean).reduce((s,g)=>s+g.amt,0);
    if(g>0){const t=el("text",{x,y:py-2,"text-anchor":"middle","font-size":10,fill:"#4ade80","font-weight":"700","pointer-events":"none"});t.textContent=`⛏+${g}`;svg.appendChild(t);}
  }
  for(const a of state.armies){
    let [x,y]=COORDS[a.node]; const others=armiesAt(a.node);
    if(a.dest&&a.path){const _i=a.path.indexOf(a.node),_nx=a.path[_i+1];   // 타일 사이 위치 보간(진행도)
      // 유저 피드백: 틱 사이(10초)에 화면이 통째로 멈춰 보임 — 실제 틱값(a.moveProg)에 "이번 틱 시작 후 지난 실제 시간" 만큼의
      // 예상 진행분을 더해 매 프레임 조금씩 앞으로 미리 보여줌(다음 틱이 오면 실제값으로 자연히 맞춰짐, 되돌아가지 않게 상한).
      if(_nx&&COORDS[_nx]){ let _p=Math.max(0,Math.min(1,a.moveProg||0));
        if(!rtPaused&&typeof tickBarSince!=="undefined"){ const extra=Game.armySpeed(state,a)*((Date.now()-tickBarSince)/(RT_BASE/rtSpeed)); _p=Math.max(0,Math.min(1,_p+Math.max(0,extra))); }
        x+=(COORDS[_nx][0]-x)*_p;y+=(COORDS[_nx][1]-y)*_p;}}
    const idx=others.indexOf(a), off=others.length>1?(idx-(others.length-1)/2)*26:0;
    const ax=x+off,ay=y-2;
    const sel = state.selected?.kind==="army"&&state.selected.id===a.id;
    const col = a.side==="P"?"#3b82f6":a.side==="M"?"#7c3aed":"#ef4444";
    const glow= a.side==="P"?"#93c5fd":a.side==="M"?"#c4b5fd":"#fca5a5";
    if(sel){ // 선택 강조: 헤일로 + 굵은 금색 링
      svg.appendChild(el("circle",{cx:ax,cy:ay,r:23,fill:col,opacity:0.20}));
      svg.appendChild(el("circle",{cx:ax,cy:ay,r:18,fill:"none",stroke:"#fbbf24","stroke-width":3.5}));
    } else if(a.side!=="P"){ // 적·몬스터: 외곽 링으로 잘 보이게
      svg.appendChild(el("circle",{cx:ax,cy:ay,r:16,fill:"none",stroke:glow,"stroke-width":2,opacity:0.55}));
    }
    const grp=el("g",{class:"army","data-army":a.id});
    if(a.side!=="P") grp.setAttribute("pointer-events","none"); // 적 토큰 클릭 통과 → 노드가 대상
    grp.appendChild(el("circle",{cx:ax,cy:ay,r:13,fill:col,stroke:"#0b1220","stroke-width":2.5}));
    const t=el("text",{x:ax,y:ay+4.5,"text-anchor":"middle","font-size":12,fill:"#fff","font-weight":"800","pointer-events":"none"});
    t.textContent=a.side==="P"?"⚔":a.side==="M"?"☠":"✕";grp.appendChild(t);
    svg.appendChild(grp);
    // 병력 수 배지 (우하단)
    const cnt=troops(a), bw=cnt>=10?21:16;
    svg.appendChild(el("rect",{x:ax+5,y:ay+4,width:bw,height:14,rx:7,fill:"#0b1220",stroke:col,"stroke-width":1.5,"pointer-events":"none"}));
    const ct=el("text",{x:ax+5+bw/2,y:ay+14,"text-anchor":"middle","font-size":10,fill:"#fff","font-weight":"700","pointer-events":"none"}); ct.textContent=cnt; svg.appendChild(ct);
    if(a.hero){const h=el("text",{x:ax-13,y:ay-7,"font-size":13,"pointer-events":"none",fill:"#fbbf24"});h.textContent="★";svg.appendChild(h);}
    // 선택 부대 이름 라벨 (위)
    if(sel){ const nm=a.name, w=nm.length*12+16;
      svg.appendChild(el("rect",{x:ax-w/2,y:ay-40,width:w,height:19,rx:9,fill:"#fbbf24","pointer-events":"none"}));
      const nt=el("text",{x:ax,y:ay-26,"text-anchor":"middle","font-size":11,fill:"#1a1200","font-weight":"800","pointer-events":"none"});nt.textContent=nm;svg.appendChild(nt);
    }
  }
  if(state.pendingMove){ // 노드 옆 확정/취소 팝업 (최상단)
    const pm=state.pendingMove, tx=COORDS[pm.target][0], ty=COORDS[pm.target][1];
    const okg=el("g",{"data-confirm":"1",style:"cursor:pointer"});
    okg.appendChild(el("rect",{x:tx-54,y:ty-56,width:66,height:26,rx:8,fill:"#111827",stroke:pm.attack?"#ef4444":"#f59e0b","stroke-width":2}));
    const okl=el("text",{x:tx-21,y:ty-39,"text-anchor":"middle","font-size":12,fill:pm.attack?"#f87171":"#fbbf24","font-weight":"700","pointer-events":"none"});
    okl.textContent=pm.attack?"⚔️ 공격":"✓ 이동"; okg.appendChild(okl); svg.appendChild(okg);
    const nog=el("g",{"data-cancel":"1",style:"cursor:pointer"});
    nog.appendChild(el("rect",{x:tx+15,y:ty-56,width:34,height:26,rx:8,fill:"#111827",stroke:"#475569","stroke-width":2}));
    const nol=el("text",{x:tx+32,y:ty-39,"text-anchor":"middle","font-size":13,fill:"#94a3b8","pointer-events":"none"}); nol.textContent="✕"; nog.appendChild(nol); svg.appendChild(nog);
  }
  attach();
}
//__UI__
</script>
</body>
</html>
