<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>판타지 미니 4X — Phase B 조각②: 채집 + 성 내정</title>
<style>
  :root{--bg:#0f172a;--card:#1e293b;--card2:#273449;--line:#334155;--txt:#e2e8f0;--dim:#94a3b8;
    --blue:#3b82f6;--red:#ef4444;--gold:#f59e0b;--green:#22c55e;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,"Malgun Gothic",system-ui,sans-serif;padding:12px;line-height:1.4;font-size:14px;}
  h1{font-size:18px;margin:0 0 8px;}
  .top{display:flex;flex-wrap:wrap;gap:10px;align-items:center;background:var(--card);
    border:1px solid var(--line);border-radius:10px;padding:8px 12px;margin-bottom:10px;}
  .res{display:flex;gap:6px;align-items:center;background:var(--bg);border:1px solid var(--line);
    border-radius:8px;padding:4px 9px;font-variant-numeric:tabular-nums;}
  .res .inc{color:var(--green);font-size:12px;}
  button{background:var(--card2);color:var(--txt);border:1px solid var(--line);border-radius:8px;
    padding:6px 12px;font-size:13px;cursor:pointer;font-weight:600;}
  button:hover:not(:disabled){background:var(--line);}
  button:disabled{opacity:.4;cursor:default;}
  #endturn{background:var(--green);color:#04240f;border:none;}
  .wrap{display:grid;grid-template-columns:1fr 300px;gap:10px;}
  @media(max-width:820px){.wrap{grid-template-columns:1fr;}}
  .mapbox{background:#0b1220;border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  svg{display:block;width:100%;height:auto;}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;font-size:13px;}
  .panel h3{margin:0 0 8px;font-size:14px;display:flex;justify-content:space-between;}
  .k{color:var(--dim);}
  .edge{stroke:#334155;stroke-width:3;}
  .reach{stroke:var(--green);stroke-width:3;stroke-dasharray:5 4;fill:none;opacity:.9;}
  .nlabel{fill:var(--dim);font-size:11px;text-anchor:middle;pointer-events:none;}
  .gath{fill:var(--green);font-size:11px;text-anchor:middle;font-weight:700;pointer-events:none;}
  .army{cursor:pointer;} .node-hit{cursor:pointer;}
  .sel-ring{fill:none;stroke:var(--gold);stroke-width:3;stroke-dasharray:4 3;}
  .prodrow{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--card2);}
  .prodrow .nm{flex:1;} .prodrow .cost{font-size:11px;color:var(--dim);}
  .hero{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:7px;margin:6px 0;}
  .hero .loc{font-size:11px;color:var(--gold);}
  .minibtn{font-size:11px;padding:3px 7px;}
  .toast{position:fixed;left:50%;top:14px;transform:translateX(-50%);background:#111827;
    border:1px solid var(--line);padding:8px 15px;border-radius:8px;font-size:13px;opacity:0;
    transition:opacity .25s;pointer-events:none;z-index:9;}
  .toast.show{opacity:1;}
  .queue{font-size:12px;color:var(--dim);margin-top:4px;}
  hr{border:none;border-top:1px solid var(--line);margin:10px 0;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:20;}
  .modal-overlay.hidden{display:none;}
  .modal{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 24px;max-width:340px;text-align:center;}
  .modal h2{margin:0 0 10px;font-size:20px;}
  .modal .res-line{margin:7px 0;font-size:14px;}
  .modal button{margin-top:14px;padding:6px 18px;}
</style>
</head>
<body>
<h1>🏰 Phase C — 타일 그리드 (14×9, game.js 재사용)</h1>
<div class="top">
  <span class="k">턴 <b id="turn" style="color:var(--gold)">1</b></span>
  <span id="resbar" style="display:flex;gap:6px;flex-wrap:wrap"></span>
  <span id="moveConfirm"></span>
  <span style="flex:1"></span>
  <button id="saveBtn" title="현재 판 저장(브라우저)">💾</button>
  <button id="loadBtn" title="저장된 판 불러오기">📂</button>
  <button id="exportBtn" title="세이브 파일로 내보내기">⬇</button>
  <button id="importBtn" title="세이브 파일 가져오기">⬆</button>
  <input type="file" id="importFile" accept=".json,application/json" style="display:none">
  <button id="newBtn" title="새 게임">🆕</button>
  <button id="castleBtn">🏰 성 내정</button>
  <button id="endturn">⏭ 턴 종료</button>
</div>
<div class="wrap">
  <div class="mapbox"><svg id="map" viewBox="0 0 776 506" preserveAspectRatio="xMidYMid meet"></svg></div>
  <div id="panel" class="panel"></div>
</div>
<div class="k" style="font-size:12px;margin-top:8px">채집·생산으로 군을 키워 <b>적 성(🏰 우측)을 함락하면 승리</b>. 부대가 적과 만나면 전투 엔진으로 교전하고, 성 수비는 성벽 보정을 받습니다.</div>
<div class="toast" id="toast"></div>
<div id="modal" class="modal-overlay hidden"><div class="modal" id="modalBody"></div></div>

<script>
//__ENGINE__
//__GAME__
/* ===== 타일 그리드 맵 생성 → game.js 에 주입 (로직 재사용) ===== */
const GW=14, GH=9, TS=54, PAD=10;
function buildTileMap(){
  const NODES={}, EDGES=[], COORD={}, grid=[];
  // 성(P/E)·고대성 + 양 진영 대칭 자원 클러스터(성 근처 4자원씩). 몬스터는 랜덤 스폰(고정 둥지 없음).
  const specials=[
    {x:1,y:4,id:"P",def:{name:"아군 성",type:"castle",owner:"P"}},
    {x:GW-2,y:4,id:"E",def:{name:"적 성",type:"castle",owner:"E"}},
    {x:Math.floor(GW/2),y:7,id:"ANCIENT",def:{name:"고대성",type:"ancient",owner:null}},
  ];
  // 성 기준 자원 오프셋(거울 대칭). E는 x를 반전.
  const resOff=[{dx:2,dy:-2,res:"식량",nm:"곡창"},{dx:2,dy:2,res:"목재",nm:"삼림"},{dx:3,dy:-1,res:"석재",nm:"채석장"},{dx:3,dy:1,res:"철",nm:"철광"}];
  resOff.forEach((o,i)=>{
    specials.push({x:1+o.dx,y:4+o.dy,id:"PR"+i,def:{name:o.nm,type:"resource",res:o.res}});
    specials.push({x:(GW-2)-o.dx,y:4+o.dy,id:"ER"+i,def:{name:"동부 "+o.nm,type:"resource",res:o.res}});
  });
  const at={}; for(const s of specials) at[s.x+","+s.y]=s;
  for(let y=0;y<GH;y++){grid[y]=[];for(let x=0;x<GW;x++){
    const s=at[x+","+y]; const id=s?s.id:("t"+x+"_"+y);
    NODES[id]=s?{...s.def}:{name:"",type:"plain"}; COORD[id]=[x,y]; grid[y][x]=id;
  }}
  for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){
    if(x<GW-1)EDGES.push([grid[y][x],grid[y][x+1],1]);
    if(y<GH-1)EDGES.push([grid[y][x],grid[y+1][x],1]);
  }
  const spawn={ count:5,
    raid:{name:"고대 생물",mtier:"레이드",comp:{오우거:6,오크:12,하피:8},reward:{철:70,석재:50,식량:50}},
    pool:[
      {name:"늑대 무리",mtier:"사냥",comp:{늑대:12},reward:{식량:25,목재:20}},
      {name:"도적 무리",mtier:"사냥",comp:{고블린:8,늑대:4},reward:{식량:20,철:12}},
      {name:"고블린 무리",mtier:"토벌",comp:{오크:6,하피:6,오우거:2},reward:{철:40,석재:30,식량:30}},
      {name:"오크 무리",mtier:"토벌",comp:{오크:10,오우거:3,하피:5},reward:{철:35,목재:30,석재:25}},
    ] };
  return {map:{NODES,EDGES,spawn}, COORD};
}
const TILE=buildTileMap();
Game.setMap(TILE.map);
const COORDS={}; for(const id in TILE.COORD){const[gx,gy]=TILE.COORD[id];COORDS[id]=[PAD+gx*TS+TS/2, PAD+gy*TS+TS/2];}
/* ===== game.js 바인딩 (단일 소스, 타일맵 주입 후) ===== */
const {NODES,EDGES,ADJ,RES,UNIT_COST,ECON_BUILDINGS,ECON_CAP,BUILDINGS,RESEARCH,GROUPS,STATNAME,ARMY_CAP,CASTLE_UP_COST,UNIV_COST,dijkstra,pathTo,troops,
  TIER_MAX,TIER_NAME,unitLabel,baseOf,tierOf,costOf,maxTierFor,heroEffect,UNIT_BLD}=Game;
const state=Game.newGame();
state.selected=null; state.pendingMove=null; state.mode="normal"; state.castleTab="건물"; state.prodTier={}; // UI 전용 필드
const A=id=>state.armies.find(a=>a.id===id);
const armiesAt=n=>state.armies.filter(a=>a.node===n);
const heroById=id=>state.heroes.find(h=>h.id===id);
const income=()=>Game.income(state);
const buildRate=()=>Game.buildRate(state);
const hasR=k=>Game.hasR(state,k);
const gatherOf=a=>Game.gatherOf(state,a);
const canAfford=c=>Game.canAfford(state,c);

/* ===== 렌더 ===== */
const svg=document.getElementById('map'), SVGNS="http://www.w3.org/2000/svg";
const el=(t,a)=>{const e=document.createElementNS(SVGNS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
const nodeColor=n=>n.type==="castle"?"#f59e0b":n.type==="resource"?"#22c55e":n.type==="den"?"#7f1d1d":n.type==="ancient"?"#6d28d9":"#475569";

const tileFill=n=>n.type==="castle"?"#3b2408":n.type==="resource"?"#0f2e1a":n.type==="den"?"#2a0e0e":n.type==="ancient"?"#241247":"#131a26";
function renderMap(){
  svg.innerHTML="";
  let reach={};
  if(state.selected?.kind==="army"){const a=A(state.selected.id);if(a?.side==="P")reach=dijkstra(a.node,a.mp).dist;}
  const selNode=A(state.selected?.id)?.node;
  const onPath={}; if(state.pendingMove) for(const t of state.pendingMove.path) onPath[t]=1;
  // ---- 타일 ----
  for(const id in NODES){
    const n=NODES[id],[x,y]=COORDS[id],px=x-TS/2,py=y-TS/2;
    const reachable = reach[id]!==undefined && id!==selNode;
    let stroke="#0b1220", sw=1;
    if(onPath[id]){stroke="#f59e0b";sw=2.5;} else if(reachable){stroke="#fbbf24";sw=1.5;}
    svg.appendChild(el("rect",{x:px+1.5,y:py+1.5,width:TS-3,height:TS-3,rx:6,fill:tileFill(n),stroke,"stroke-width":sw,
      class:"node-hit","data-node":id,...(reachable?{"data-go":id}:{}),style:"cursor:pointer"}));
    if(n.type==="castle")svg.appendChild(el("rect",{x:px+3,y:py+3,width:TS-6,height:TS-6,rx:5,fill:"none",stroke:n.owner==="P"?"#3b82f6":"#ef4444","stroke-width":2.5,"pointer-events":"none"}));
    if(n.type==="ancient")svg.appendChild(el("rect",{x:px+3,y:py+3,width:TS-6,height:TS-6,rx:5,fill:"none",stroke:n.owner==="P"?"#3b82f6":n.owner==="E"?"#ef4444":"#c4b5fd","stroke-width":2.5,"stroke-dasharray":n.owner?"none":"4 3","pointer-events":"none"}));
    if(n.type!=="plain"){
      const ic=el("text",{x,y:y-2,"text-anchor":"middle","font-size":18,"pointer-events":"none"});
      ic.textContent=n.type==="castle"?"🏰":n.type==="ancient"?"🏛":n.type==="resource"?"◆":"☠"; svg.appendChild(ic);
      const lb=el("text",{x,y:y+16,"text-anchor":"middle","font-size":8.5,fill:"#94a3b8","pointer-events":"none"});
      lb.textContent=n.res?n.res:(n.name.length>5?n.name.slice(0,4):n.name); svg.appendChild(lb);
    }
    // 레이드 수성 진행
    if(n.type==="ancient" && state.raid.holder && state.raid.holdTurns>0){
      const rb=el("text",{x,y:py-2,"text-anchor":"middle","font-size":10,"font-weight":"800","pointer-events":"none",fill:state.raid.holder==="P"?"#93c5fd":"#fca5a5"});
      rb.textContent=`🛡${state.raid.holdTurns}/${state.raid.need}`; svg.appendChild(rb);
    }
    // 둥지 재생성 카운트다운
    if(n.type==="den" && !armiesAt(id).some(a=>a.side==="M")){
      const rs=(state.respawns||[]).find(r=>r.node===id);
      if(rs){const t=el("text",{x,y:py-2,"text-anchor":"middle","font-size":9,"pointer-events":"none",fill:"#c4b5fd"});t.textContent=`⏳${Math.max(0,rs.at-state.turn)}`;svg.appendChild(t);}
    }
    // 채집 표시
    const g=armiesAt(id).map(gatherOf).filter(Boolean).reduce((s,g)=>s+g.amt,0);
    if(g>0){const t=el("text",{x,y:py-2,"text-anchor":"middle","font-size":10,fill:"#4ade80","font-weight":"700","pointer-events":"none"});t.textContent=`⛏+${g}`;svg.appendChild(t);}
  }
  for(const a of state.armies){
    const[x,y]=COORDS[a.node],others=armiesAt(a.node);
    const idx=others.indexOf(a), off=others.length>1?(idx-(others.length-1)/2)*26:0;
    const ax=x+off,ay=y-2;
    const sel = state.selected?.kind==="army"&&state.selected.id===a.id;
    const col = a.side==="P"?"#3b82f6":a.side==="M"?"#7c3aed":"#ef4444";
    const glow= a.side==="P"?"#93c5fd":a.side==="M"?"#c4b5fd":"#fca5a5";
    if(sel){ // 선택 강조: 헤일로 + 굵은 금색 링
      svg.appendChild(el("circle",{cx:ax,cy:ay,r:23,fill:col,opacity:0.20}));
      svg.appendChild(el("circle",{cx:ax,cy:ay,r:18,fill:"none",stroke:"#fbbf24","stroke-width":3.5}));
    } else if(a.side!=="P"){ // 적·몬스터: 외곽 링으로 잘 보이게
      svg.appendChild(el("circle",{cx:ax,cy:ay,r:16,fill:"none",stroke:glow,"stroke-width":2,opacity:0.55}));
    }
    const grp=el("g",{class:"army","data-army":a.id});
    if(a.side!=="P") grp.setAttribute("pointer-events","none"); // 적 토큰 클릭 통과 → 노드가 대상
    grp.appendChild(el("circle",{cx:ax,cy:ay,r:13,fill:col,stroke:"#0b1220","stroke-width":2.5}));
    const t=el("text",{x:ax,y:ay+4.5,"text-anchor":"middle","font-size":12,fill:"#fff","font-weight":"800","pointer-events":"none"});
    t.textContent=a.side==="P"?"⚔":a.side==="M"?"☠":"✕";grp.appendChild(t);
    svg.appendChild(grp);
    // 병력 수 배지 (우하단)
    const cnt=troops(a), bw=cnt>=10?21:16;
    svg.appendChild(el("rect",{x:ax+5,y:ay+4,width:bw,height:14,rx:7,fill:"#0b1220",stroke:col,"stroke-width":1.5,"pointer-events":"none"}));
    const ct=el("text",{x:ax+5+bw/2,y:ay+14,"text-anchor":"middle","font-size":10,fill:"#fff","font-weight":"700","pointer-events":"none"}); ct.textContent=cnt; svg.appendChild(ct);
    if(a.hero){const h=el("text",{x:ax-13,y:ay-7,"font-size":13,"pointer-events":"none",fill:"#fbbf24"});h.textContent="★";svg.appendChild(h);}
    // 선택 부대 이름 라벨 (위)
    if(sel){ const nm=a.name, w=nm.length*12+16;
      svg.appendChild(el("rect",{x:ax-w/2,y:ay-40,width:w,height:19,rx:9,fill:"#fbbf24","pointer-events":"none"}));
      const nt=el("text",{x:ax,y:ay-26,"text-anchor":"middle","font-size":11,fill:"#1a1200","font-weight":"800","pointer-events":"none"});nt.textContent=nm;svg.appendChild(nt);
    }
  }
  if(state.pendingMove){ // 노드 옆 확정/취소 팝업 (최상단)
    const pm=state.pendingMove, tx=COORDS[pm.target][0], ty=COORDS[pm.target][1];
    const okg=el("g",{"data-confirm":"1",style:"cursor:pointer"});
    okg.appendChild(el("rect",{x:tx-54,y:ty-56,width:66,height:26,rx:8,fill:"#111827",stroke:pm.attack?"#ef4444":"#f59e0b","stroke-width":2}));
    const okl=el("text",{x:tx-21,y:ty-39,"text-anchor":"middle","font-size":12,fill:pm.attack?"#f87171":"#fbbf24","font-weight":"700","pointer-events":"none"});
    okl.textContent=pm.attack?"⚔️ 공격":"✓ 이동"; okg.appendChild(okl); svg.appendChild(okg);
    const nog=el("g",{"data-cancel":"1",style:"cursor:pointer"});
    nog.appendChild(el("rect",{x:tx+15,y:ty-56,width:34,height:26,rx:8,fill:"#111827",stroke:"#475569","stroke-width":2}));
    const nol=el("text",{x:tx+32,y:ty-39,"text-anchor":"middle","font-size":13,fill:"#94a3b8","pointer-events":"none"}); nol.textContent="✕"; nog.appendChild(nol); svg.appendChild(nog);
  }
  attach();
}
function renderResBar(){
  const inc=income();
  document.getElementById('resbar').innerHTML=RES.map(r=>{
    const v=inc[r];
    return `<span class="res">${r} <b>${state.res[r]}</b> <span class="inc" style="${v<0?'color:#fca5a5':''}">${v>=0?'+':''}${v}</span></span>`;
  }).join("")
    +`<span class="res" style="border-color:#c4b5fd;color:#c4b5fd">🏵 토벌 <b>${state.subdue||0}</b></span>`
    +`<span class="res" style="border-color:#fbbf24;color:#fbbf24">📜 경험치 <b>${state.xpItems||0}</b></span>`;
  document.getElementById('turn').textContent=state.turn;
}
function renderPanel(){
  const p=document.getElementById('panel'); const s=state.selected;
  let h="";
  if(s?.kind==="node" && NODES[s.id].type==="castle" && NODES[s.id].owner==="P"){
    const c=state.castle, br=buildRate();
    const tab=state.castleTab||"건물"; const busy=!!c.build;
    h+=`<h3>🏰 성 내정 <span class="k">Lv.${c.level}</span></h3>`;
    const upkeep=Game.foodUpkeep(state), tt=Game.totalTroops(state);
    h+=`<div class="k">생산 ${br}/턴${br>1?' <span style="color:var(--gold)">(내정영웅)</span>':''} · 부대 ${Game.pArmyCount(state)}/${Game.armySlots(state)} · 병력 ${tt}${c.wall?` · 🧱${c.wall}`:""}</div>`;
    if(upkeep>0) h+=`<div class="k" style="font-size:11px${state.starving?';color:#fca5a5':''}">🍞 식량 유지비 ${upkeep}/턴${state.starving?" · ⚠ 고갈! 생산 중단 — 농장 증설/병력 감축":""}</div>`;
    h+=`<div class="queue" style="font-size:11px">대기열(${c.queue.length}): ${c.queue.length?c.queue.map(unitLabel).join(", "):"—"}</div>`;
    {const wnd=state.castle.wounded, wTot=Object.values(wnd).reduce((x,y)=>x+y,0);
     if(wTot>0) h+=`<div style="color:#fca5a5;font-size:12px">🩹 부상자 ${wTot} <span class="k">(병원 ${(state.castle.econ["병원"]||0)*3}/턴 치료)</span></div>`;}
    // 탭 바
    h+=`<div style="display:flex;gap:4px;margin:7px 0">`;
    for(const t of ["건물","연구","선술집","출전"]) h+=`<button class="minibtn" data-ctab="${t}" style="flex:1;${tab===t?'background:var(--line);border-color:var(--gold);color:var(--gold);':''}">${t}</button>`;
    h+=`</div>`;
    if(tab==="건물"){
    if(busy){const pct=Math.round(100*(c.build.total-c.build.left)/c.build.total);
      h+=`<div style="background:var(--bg);border:1px solid var(--gold);border-radius:8px;padding:6px 8px;margin-bottom:8px;font-size:12px">
        🏗 건설 중: <b style="color:var(--gold)">${c.build.label}</b> — ${c.build.left}턴 남음
        <div style="height:5px;background:var(--line);border-radius:3px;margin-top:4px"><div style="height:100%;width:${pct}%;background:var(--gold);border-radius:3px"></div></div></div>`;}
    h+=`<div class="prodrow"><span class="nm">성 레벨업 <span class="k">Lv.${c.level} · ${Game.buildDur("castle")}턴</span></span>
      <span class="cost">목${CASTLE_UP_COST.목재} 석${CASTLE_UP_COST.석재} 철${CASTLE_UP_COST.철}</span>

function render(){renderMap();renderResBar();renderPanel();renderMoveConfirm();}

function attach(){
  svg.querySelectorAll('[data-confirm]').forEach(g=>g.onclick=e=>{e.stopPropagation();confirmMove();});
  svg.querySelectorAll('[data-cancel]').forEach(g=>g.onclick=e=>{e.stopPropagation();cancelMove();});
  svg.querySelectorAll('[data-army]').forEach(g=>g.onclick=e=>{e.stopPropagation();
    const a=A(g.dataset.army), sel=state.selected?.kind==="army"?A(state.selected.id):null;
    // 아군 부대 선택 중 다른 노드 클릭(아군 토큰 포함) → 그 노드로 이동 예약
    if(sel && sel.side==="P" && a.node!==sel.node){
      const {dist}=dijkstra(sel.node,sel.mp);
      if(dist[a.node]!==undefined){ stageMove(a.node); return; }
    }
    state.pendingMove=null; state.selected={kind:"army",id:a.id}; render();});
  svg.querySelectorAll('[data-go]').forEach(c=>c.onclick=e=>{e.stopPropagation();stageMove(c.dataset.go);});
  svg.querySelectorAll('[data-node]').forEach(c=>c.onclick=e=>{e.stopPropagation();
    const sel=state.selected?.kind==="army"?A(state.selected.id):null;
    if(sel && sel.side==="P"){ const {dist}=dijkstra(sel.node,sel.mp);
      if(dist[c.dataset.node]!==undefined && c.dataset.node!==sel.node){ stageMove(c.dataset.node); return; } }
    state.pendingMove=null; state.selected={kind:"node",id:c.dataset.node};render();});
}
function stageMove(target){ // 1단계: 이동 예약 (확정 전엔 안 움직임)
  if(state.over) return;
  const a=A(state.selected?.id); if(!a) return;
  const {dist,prev}=dijkstra(a.node,a.mp);
  if(dist[target]===undefined||target===a.node){toast("이동력 부족");return;}
  state.pendingMove={armyId:a.id,target,path:pathTo(target,prev),cost:dist[target],
    attack:armiesAt(target).some(x=>x.side!=="P")};
  render();
}
function confirmMove(){ // 2단계: 확정 → 실제 이동 (도착 노드에 적이 있으면 전투)
  const pm=state.pendingMove; if(!pm||state.over) return;
  const a=A(pm.armyId), path=pm.path, cost=pm.cost, target=pm.target; state.pendingMove=null; state.mode="normal";
  let i=0;
  const step=()=>{ i++;
    if(i<path.length){ a.node=path[i]; render(); setTimeout(step,170); }
    else {
      const r=Game.executeMove(state,pm.armyId,target,cost);
      state.selected=null;   // 이동 완료 후 선택 해제
      render();
      if(r.battle) showBattleModal(r.battle);
      if(state.over) endGame();
    }
  };
  step();
}
function cancelMove(){ state.pendingMove=null; state.mode="normal"; render(); }
function renderMoveConfirm(){ // 상단엔 안내만, 확정 버튼은 지도 노드 옆 팝업
  const box=document.getElementById('moveConfirm'); const pm=state.pendingMove;
  box.innerHTML = pm
    ? `<span class="res" style="border-color:${pm.attack?'var(--red)':'var(--gold)'}">${pm.attack?'⚔️ 공격 준비':'이동 준비'}: <b>${NODES[pm.target].name}</b> — 지도의 확정 버튼</span>`
    : "";
}
function produce(u,qty,tier){const m=Game.produce(state,u,qty,tier); const lbl=(tier>1?u+" T"+tier:u); toast(m||`${lbl} ×${Math.max(1,qty|0)} 생산 대기열`); render();}
function construct(key){const m=Game.construct(state,key); toast(m||`🏗 ${key} 건설 시작`); render();}
function upgradeBuilding(key){const m=Game.upgradeBuilding(state,key); toast(m||`🏗 ${key} 레벨업 시작`); render();}
function fortifyWall(){const m=Game.fortifyWall(state); toast(m||`🏗 성벽 보강 시작`); render();}
function promoteHero(hid){const m=Game.promoteHero(state,hid); toast(m||`영웅 승급! ★${heroById(hid).grade}`); render();}
function draftAdjust(u,d){Game.draftAdjust(state,u,d); render();}
function composerHTML(){ // 재사용: 주둔군 → 출전 편성 UI (버튼은 호출부에서)
  const gar=state.castle.garrison, draft=state.castle.draft;
  const draftTotal=Object.values(draft).reduce((x,y)=>x+y,0), garTotal=Object.values(gar).reduce((x,y)=>x+y,0);
  const acap=Game.armySlots(state), acur=Game.pArmyCount(state), afull=!Game.canAddArmy(state);
  let h=`<div class="k" style="margin-bottom:4px">🚩 출전 편성 <span class="k">(주둔 ${garTotal} · 부대 <span style="color:${afull?'#fca5a5':'#cbd5e1'}">${acur}/${acap}</span>)</span></div>`;
  if(afull) h+=`<div class="k" style="font-size:11px;color:#fca5a5">부대 수 상한 도달 — 성 레벨업·군제 개편 연구로 확대</div>`;
  if(garTotal===0 && draftTotal===0) return h+`<div class="k" style="font-size:12px">주둔 병력 없음 — 성에서 생산하세요.</div>`;
  const keys=[...new Set([...Object.keys(gar),...Object.keys(draft)])].sort((a,b)=>baseOf(a).localeCompare(baseOf(b))||tierOf(a)-tierOf(b));
  for(const u of keys){ const avail=gar[u]||0, d=draft[u]||0; if(avail+d<=0) continue;
    h+=`<div class="prodrow"><span class="nm">${unitLabel(u)} <span class="k">보유 ${avail}</span></span>
      <button class="minibtn" data-draft="${u}" data-d="-1" ${d<=0?"disabled":""}>−</button>
      <span style="min-width:18px;text-align:center">${d}</span>
      <button class="minibtn" data-draft="${u}" data-d="1" ${d>=avail||draftTotal>=ARMY_CAP?"disabled":""}>＋</button></div>`;
  }
  return h+`<div class="k" style="font-size:12px;margin-top:4px">편성 ${draftTotal}/${ARMY_CAP}</div>`;
}
function deploy(){if(!Game.canAddArmy(state)){toast("부대 수 상한 도달 — 성 레벨업·군제 개편 필요");return;} const army=Game.deploy(state); if(army){state.selected={kind:"army",id:army.id};state.mode="normal";toast(`${army.name} 성에 출전!`);} render();}
function deployTo(target){if(!Game.canAddArmy(state)){toast("부대 수 상한 도달 — 성 레벨업·군제 개편 필요");return;} const r=Game.deployTo(state,target); if(!r.army){toast("편성된 병력이 없습니다");return;}
  state.selected={kind:"army",id:r.army.id};
  if(r.stage){const {prev}=dijkstra("P",99); state.pendingMove={armyId:r.army.id,target:r.stage.target,path:pathTo(r.stage.target,prev),cost:r.stage.cost,attack:r.stage.attack};}
  toast(`${r.army.name} 출전 → ${NODES[target].name} 방면`); render();}
function disband(id){const m=Game.disband(state,id); if(m){toast(m);return;} state.selected={kind:"node",id:"P"}; toast("부대 귀환 — 병력이 주둔군에 합류"); render();}
function buildEcon(k){const m=Game.buildEcon(state,k); toast(m||`🏗 ${k} 레벨업 시작`); render();}
function buildUniversity(){const m=Game.buildUniversity(state); toast(m||"🏗 대학 건설 시작"); render();}
function buildTavern(){const m=Game.buildTavern(state); toast(m||"🏗 선술집 건설 시작"); render();}
function recruitHero(cid){const m=Game.recruitHero(state,cid); toast(m||"영웅 영입 완료 — 대기 상태로 합류"); render();}
function specialRecruit(){const m=Game.specialRecruit(state); toast(m||"★3 영웅 특별 영입 성공!"); render();}
function startResearch(k){const m=Game.startResearch(state,k); toast(m||`${k} 연구 시작`); render();}
function levelUp(){const m=Game.levelUp(state); toast(m||"🏗 성 레벨업 시작"); render();}
function assignHero(hid,loc){Game.assignHero(state,hid,loc); toast(`${heroById(hid).name} → ${loc==="castle"?"성":loc==="idle"?"대기":A(loc)?.name}`); render();}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1600);}

/* 전투·AI·규칙은 game.js 담당 (Game.*). UI만 아래에. */
function showModal(html){document.getElementById('modalBody').innerHTML=html;
  document.getElementById('modal').classList.remove('hidden');
  const c=document.getElementById('modalClose'); if(c)c.onclick=hideModal;}
function hideModal(){document.getElementById('modal').classList.add('hidden');}
function showBattleModal(sum){
  const pWon=(sum.w==="A"&&sum.aSide==="P")||(sum.w==="B"&&sum.aSide==="E");
  const tag=sum.w==="draw"?'<span class="k">무승부</span>':(pWon?'<span style="color:var(--blue)">🔵 아군 우세</span>':'<span style="color:var(--red)">🔴 적 우세</span>');
  const stars=g=>"★".repeat(g);
  const heroLine=(sum.heroA||sum.heroB)?`<div class="res-line" style="color:var(--gold);font-size:12px">${[sum.heroA?`공격 ${stars(sum.gradeA)} ${sum.heroA}(+${sum.buffA}%)`:"",sum.heroB?`수비 ${stars(sum.gradeB)} ${sum.heroB}(+${sum.buffB}%)`:""].filter(Boolean).join(" · ")}</div>`:"";
  showModal(`<h2>⚔️ 전투</h2>
    <div class="res-line">${sum.attacker} <span class="k">→</span> ${sum.defender}${sum.fort?' <span class="k">(방어 보정)</span>':''}</div>
    ${heroLine}
    <div class="res-line">${tag}</div><div class="res-line"><b>${sum.result}</b></div>
    <div class="res-line k">생존 — 공격 ${sum.survA} · 수비 ${sum.survB}</div>
    <button class="minibtn" id="modalClose">확인</button>`);
}
function endGame(){
  state.over=true; document.getElementById('endturn').disabled=true;
  const win=state.winner==="P", raid=state.winBy==="raid";
  const msg = win ? (raid?"고대성을 수성해 레이드 승리!":"적 수도를 함락했습니다.")
                  : (raid?"적이 고대성 레이드를 완성했습니다.":"수도를 빼앗겼습니다.");
  showModal(`<h2>${win?"🏆 승리!":"💀 패배"} <span class="k" style="font-size:14px">${raid?"[레이드]":"[정복]"}</span></h2>
    <div class="res-line">${msg}</div>
    <div class="res-line k">${state.turn}턴 소요</div>
    <button class="minibtn" id="modalClose">닫기</button>`);
}

/* ===== 저장/불러오기 ===== */
const SAVE_KEY="mini4x_save_v1", UI_FIELDS=["selected","pendingMove","mode","castleTab","prodTier"];
function saveSnapshot(){const o={...state,ancientOwner:NODES.ANCIENT.owner};for(const f of UI_FIELDS)delete o[f];return JSON.parse(JSON.stringify(o));}
function applySave(data){
  for(const k in state){if(!UI_FIELDS.includes(k))delete state[k];}
  Object.assign(state,data); NODES.ANCIENT.owner=data.ancientOwner!==undefined?data.ancientOwner:null; delete state.ancientOwner;
  state.selected=null;state.pendingMove=null;state.mode="normal"; state.castleTab=state.castleTab||"건물"; state.prodTier=state.prodTier||{};
  document.getElementById('endturn').disabled=!!state.over; render();
}
function saveLocal(silent){try{localStorage.setItem(SAVE_KEY,JSON.stringify(saveSnapshot()));if(!silent)toast("💾 저장됨 (이 브라우저)");return true;}catch(e){if(!silent)toast("⚠ 브라우저 저장 불가 — ⬇ 파일로 내보내세요");return false;}}
function loadLocal(){try{const s=localStorage.getItem(SAVE_KEY);if(!s){toast("저장된 판이 없습니다");return;}applySave(JSON.parse(s));toast("📂 불러왔습니다 — 턴 "+state.turn);}catch(e){toast("⚠ 불러오기 실패");}}
function exportFile(){const blob=new Blob([JSON.stringify(saveSnapshot())],{type:"application/json"});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download="mini4x_턴"+state.turn+".json";a.click();URL.revokeObjectURL(a.href);toast("⬇ 세이브 파일 내보냄");}
function importFile(file){const r=new FileReader();r.onload=()=>{try{applySave(JSON.parse(r.result));toast("⬆ 가져왔습니다 — 턴 "+state.turn);}catch(e){toast("⚠ 파일 형식 오류");}};r.readAsText(file);}
function newGameReset(){if(!confirm("새 게임을 시작할까요? 저장 안 한 진행은 사라집니다."))return;applySave({...Game.newGame(),ancientOwner:null});toast("🆕 새 게임");}
document.getElementById('saveBtn').onclick=()=>saveLocal(false);
document.getElementById('loadBtn').onclick=loadLocal;
document.getElementById('exportBtn').onclick=exportFile;
document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();
document.getElementById('importFile').onchange=e=>{if(e.target.files[0])importFile(e.target.files[0]);e.target.value="";};
document.getElementById('newBtn').onclick=newGameReset;

/* ===== 턴 ===== */
document.getElementById('endturn').onclick=()=>{
  if(state.over) return;
  const r=Game.endTurn(state);
  render(); saveLocal(true);   // 매 턴 자동 저장
  if(r.enemyBattle) showBattleModal(r.enemyBattle);
  if(state.over) endGame();
  else if(r.built) toast(`🏗 ${r.built} 완성!`);
  else if(!r.enemyBattle) toast("새 턴 — 수입 정산·생산 완료");
};
document.getElementById('castleBtn').onclick=()=>{state.pendingMove=null;state.selected={kind:"node",id:"P"};render();};
svg.addEventListener('click',()=>{state.selected=null;state.pendingMove=null;state.mode="normal";render();});
render();
try{ if(localStorage.getItem(SAVE_KEY)) toast("이전 저장 있음 — 📂 눌러 이어하기"); }catch(e){}
</script>
</body>
</html>
